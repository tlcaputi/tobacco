<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Detail &mdash; Tobacco Control Laws</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

</head>
<body>
<nav class="site-nav">
  <a href="/" class="nav-brand">Tobacco Control Laws Dataset</a>
  <div class="nav-links">
    <a href="/" class="nav-link">About</a>
    <a href="/coverage/" class="nav-link">Coverage</a>
    <a href="/policies/" class="nav-link">Policy Maps</a>
  </div>
</nav>


<div class="page" id="page">
  <div class="no-data-msg" id="loading">Loading state data...</div>
</div>

<script type="module">
import {
  FIPS_TO_STATE, S_COLORS, S_LABELS, C_COLORS, C_LABELS, TYPE_COLORS,
  loadData, esc, truncUrl, isErrorNote, computeCountyStatus,
  getStateFips, getStateCounties, assignJursToCounties, buildCountyNames, buildOrdCard
} from '/js/shared.js';

const params = new URLSearchParams(window.location.search);
const stateAbbrev = (params.get('st') || '').toUpperCase();

if (!stateAbbrev) {
  document.getElementById('loading').innerHTML = 'No state specified. <a href="/coverage/">Browse all states</a>';
}

const { data: DATA, us: US_TOPO } = await loadData();
if (stateAbbrev) renderPage();

let jurFilter = '';
let jurShowFilter = 'all';

function renderPage() {
  const s = DATA.states[stateAbbrev];
  if (!s) {
    document.getElementById('loading').innerHTML = `State "${esc(stateAbbrev)}" not found. <a href="/coverage/">Browse all states</a>`;
    return;
  }

  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const js = s.jur_status || {};
  const total = s.jurisdiction_count || 0;
  const done = js.done || 0;
  const pctDone = total > 0 ? (done / total * 100) : 0;

  const statusLabel = s.status === 'done' ? 'Complete' :
    s.status === 'needs_tiebreaker' ? 'Needs Tiebreaker' :
    s.status === '1_pass' ? 'Pass 1 Done' : 'Not Started';
  const statusColor = S_COLORS[s.status] || S_COLORS['0_passes'];

  document.title = `${s.name} — Tobacco Control Laws`;

  const typeCounts = {};
  for (const j of jurs) for (const o of (j.ordinances || [])) {
    const lt = o.law_type || 'unknown';
    typeCounts[lt] = (typeCounts[lt] || 0) + 1;
  }
  const typeEntries = Object.entries(typeCounts).sort((a,b) => b[1] - a[1]);
  const maxType = typeEntries[0]?.[1] || 1;

  const page = document.getElementById('page');
  page.innerHTML = `
    <div class="breadcrumb"><a href="/">Home</a> &rsaquo; <a href="/coverage/">Coverage</a> &rsaquo; ${s.name}</div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap">
      <h1 style="font-size:1.8rem;font-weight:700">${s.name}</h1>
      <span style="display:inline-block;padding:4px 14px;border-radius:6px;font-size:0.78rem;font-weight:600;background:${statusColor}22;color:${statusColor}">${statusLabel}</span>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" style="color:var(--green)">${done.toLocaleString()}</div><div class="stat-lbl">Jurisdictions Complete</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.max(pctDone,0.5)}%;background:var(--green)"></div></div></div>
      <div class="stat"><div class="stat-val">${total.toLocaleString()}</div><div class="stat-lbl">Total Jurisdictions</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${s.ordinances_found}</div><div class="stat-lbl">Ordinances Found</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--purple)">${jurs.filter(j => j.ordinance_count > 0).length}</div><div class="stat-lbl">With Ordinances</div></div>
    </div>

    <div id="progress-bar" style="margin-bottom:22px"></div>

    <div class="map-section" style="margin-bottom:22px">
      <div id="map-container"></div>
      <div class="map-hint">Counties colored by search completion. Dots show jurisdictions with ordinances.</div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">Ordinances by Type</div>
        <div id="type-chart">${typeEntries.length === 0 ? '<div style="color:var(--muted);font-size:0.78rem">No ordinances found yet</div>' :
          typeEntries.map(([k,v],i) => {
            const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxType*100).toFixed(0)}%;background:${TYPE_COLORS[i%TYPE_COLORS.length]}"></div></div><div class="bar-val">${v}</div></div>`;
          }).join('')}</div>
      </div>
      <div class="card">
        <div class="card-title">Pipeline Status</div>
        <div style="font-size:0.82rem;margin-bottom:8px">
          ${s.has_pass1 ? '<span style="color:var(--green);font-weight:600">Pass 1</span>' : '<span style="color:var(--muted)">Pass 1</span>'}
          &rarr; ${s.has_pass2 ? '<span style="color:var(--green);font-weight:600">Pass 2</span>' : '<span style="color:var(--muted)">Pass 2</span>'}
          &rarr; ${s.has_tiebreaker ? '<span style="color:var(--green);font-weight:600">Tiebreaker</span>' : '<span style="color:var(--muted)">Tiebreaker</span>'}
        </div>
        <div style="font-size:0.78rem;color:var(--muted);line-height:1.7">
          ${done > 0 ? `<div><span style="color:var(--green);font-weight:600">${done.toLocaleString()}</span> complete (${pctDone.toFixed(1)}%)</div>` : ''}
          ${(js.needs_tiebreaker||0) > 0 ? `<div><span style="color:var(--purple);font-weight:600">${js.needs_tiebreaker}</span> need tiebreaker</div>` : ''}
          ${(js['1_pass']||0) > 0 ? `<div><span style="color:var(--blue);font-weight:600">${js['1_pass']}</span> need 2nd pass</div>` : ''}
          ${(js['0_passes']||0) > 0 ? `<div><span style="color:var(--muted)">${js['0_passes'].toLocaleString()}</span> not started</div>` : ''}
        </div>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <div class="card-title" style="font-size:0.95rem;margin-bottom:12px">Jurisdictions</div>
      <div class="jur-controls">
        <input type="text" class="jur-search" id="jur-search" placeholder="Search jurisdictions...">
        <button class="jur-filter-btn active" data-filter="all">All (${total})</button>
        <button class="jur-filter-btn" data-filter="with_ords">With ordinances (${jurs.filter(j=>j.ordinance_count>0).length})</button>
      </div>
      <div class="jur-showing" id="jur-showing"></div>
      <div id="jur-list"></div>
    </div>
  `;

  // Progress bar
  const barStatuses = [
    { key: 'done', label: 'Complete', color: '#34d399' },
    { key: 'needs_tiebreaker', label: 'Need 3rd Pass', color: '#a78bfa' },
    { key: '1_pass', label: 'Need 2nd Pass', color: '#60a5fa' },
    { key: '0_passes', label: 'Not Started', color: '#3a4050' },
  ];
  const segs = barStatuses.map(st => ({ ...st, n: js[st.key]||0, pct: total>0?(js[st.key]||0)/total*100:0 }));
  document.getElementById('progress-bar').innerHTML = `
    <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px">
      ${segs.map(seg => seg.pct > 0 ? `<div style="width:${seg.pct}%;background:${seg.color}"></div>` : '').join('')}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:0.72rem;color:var(--muted)">
      ${segs.filter(seg => seg.n > 0).map(seg => `<span><span style="color:${seg.color};font-weight:600">${seg.n.toLocaleString()}</span> ${seg.label}</span>`).join('')}
    </div>`;

  renderStateMap();
  renderJurList();

  document.getElementById('jur-search').oninput = e => { jurFilter = e.target.value; renderJurList(); };
  document.querySelectorAll('.jur-filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.jur-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      jurShowFilter = btn.dataset.filter;
      renderJurList();
    };
  });
}

function renderStateMap() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = Math.min(width * 0.65, 500);
  const tooltip = document.getElementById('tooltip');

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  const g = svg.append('g');

  const stFips = getStateFips(stateAbbrev);
  if (!stFips) return;
  const stateCounties = getStateCounties(US_TOPO, stFips);
  if (stateCounties.length === 0) return;

  const stateFC = { type: 'FeatureCollection', features: stateCounties };
  const projection = d3.geoAlbersUsa().fitSize([width - 30, height - 30], stateFC);
  if (!projection) return;
  const path = d3.geoPath().projection(projection);
  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const countyJurs = assignJursToCounties(jurs, stateCounties);
  const countyNames = buildCountyNames(jurs);

  g.selectAll('.county')
    .data(stateCounties).join('path').attr('d', path)
    .attr('fill', d => {
      const cfips = d.id.toString().padStart(5,'0');
      const statuses = (countyJurs[cfips]||[]).map(j => j.status||'0_passes');
      return C_COLORS[computeCountyStatus(statuses)];
    })
    .attr('stroke', '#3a4050').attr('stroke-width', 0.5).attr('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke', '#aaa').attr('stroke-width', 1.5);
      const cfips = d.id.toString().padStart(5,'0');
      const cjurs = countyJurs[cfips]||[];
      const cname = countyNames[cfips]||`County ${cfips}`;
      const ordCount = cjurs.reduce((s,j) => s + (j.ordinance_count||0), 0);
      tooltip.innerHTML = `<div class="tt-name">${cname}</div><div class="tt-row">${cjurs.length} jurisdictions &middot; ${ordCount} ordinances</div>`;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', '#3a4050').attr('stroke-width', 0.5);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      const cfips = d.id.toString().padStart(5,'0');
      const cname = countyNames[cfips] || '';
      const el = document.getElementById('jur-search');
      if (el) { el.value = cname.replace(' County','').replace(/, .*/,''); el.dispatchEvent(new Event('input')); el.scrollIntoView({behavior:'smooth',block:'center'}); }
    });

  // State outline
  const allStates = topojson.feature(US_TOPO, US_TOPO.objects.states).features;
  const stateFeature = allStates.find(d => d.id.toString().padStart(2,'0') === stFips);
  if (stateFeature) g.append('path').datum(stateFeature).attr('d', path).attr('fill', 'none').attr('stroke', '#667').attr('stroke-width', 1.2);

  // Ordinance dots
  const ordJurs = jurs.filter(j => j.ordinance_count > 0 && j.lat && j.lon);
  const dotData = [];
  for (const j of ordJurs) {
    const pt = projection([j.lon, j.lat]);
    if (pt) dotData.push({ ...j, x: pt[0], y: pt[1] });
  }
  const dotR = dotData.length > 40 ? 4 : dotData.length > 20 ? 5 : 7;
  const sim = d3.forceSimulation(dotData)
    .force('x', d3.forceX(d => d.x).strength(0.9))
    .force('y', d3.forceY(d => d.y).strength(0.9))
    .force('collide', d3.forceCollide(dotR + 1.5)).stop();
  for (let i = 0; i < 100; i++) sim.tick();

  const dots = g.selectAll('.ord-dot').data(dotData).join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`).attr('cursor', 'pointer');
  dots.append('circle').attr('r', dotR).attr('fill', '#fbbf24').attr('opacity', 0.9).attr('stroke', '#fff').attr('stroke-width', 1);

  const showLabels = dotData.length <= 25;
  dots.append('text').attr('x', dotR+3).attr('y', 0).attr('dy', '0.35em')
    .attr('fill', '#ccc').attr('font-size', '8px').attr('pointer-events', 'none').attr('opacity', showLabels ? 0.8 : 0)
    .text(d => { let n = d.name.replace(/, [A-Za-z]+$/, '').replace(/\b(city|town|village|CDP)\b/gi, '').trim(); return n.length > 20 ? n.slice(0,18)+'..' : n; });

  dots.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('r', dotR+3).attr('stroke-width', 2);
    if (!showLabels) d3.select(this).select('text').attr('opacity', 1);
    d3.select(this).raise();
    tooltip.innerHTML = `<div class="tt-name">${esc(d.name)}</div><div class="tt-row">${d.ordinance_count} ordinances</div>`;
    tooltip.style.display = 'block';
  })
  .on('mousemove', function(event) {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  })
  .on('mouseout', function() {
    d3.select(this).select('circle').attr('r', dotR).attr('stroke-width', 1);
    if (!showLabels) d3.select(this).select('text').attr('opacity', 0);
    tooltip.style.display = 'none';
  })
  .on('click', function(event, d) {
    const el = document.getElementById('jur-search');
    if (el) { el.value = d.name.split(',')[0]; el.dispatchEvent(new Event('input')); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  });

  // County labels
  g.selectAll('.county-label').data(stateCounties).join('text')
    .attr('x', d => path.centroid(d)[0]).attr('y', d => path.centroid(d)[1])
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('fill', '#ffffff88').attr('font-size', '7px').attr('pointer-events', 'none')
    .text(d => {
      const cfips = d.id.toString().padStart(5,'0');
      const n = countyNames[cfips];
      if (!n) return '';
      if ((path.bounds(d)[1][0] - path.bounds(d)[0][0]) < 40) return '';
      return n.replace(' County','').replace(/, .*/,'');
    });
}

function renderJurList() {
  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const q = jurFilter.toLowerCase();
  let filtered = jurs;
  if (q) filtered = filtered.filter(j => j.name.toLowerCase().includes(q));
  if (jurShowFilter === 'with_ords') filtered = filtered.filter(j => j.ordinance_count > 0);

  filtered.sort((a,b) => {
    if (a.ordinance_count > 0 && b.ordinance_count === 0) return -1;
    if (b.ordinance_count > 0 && a.ordinance_count === 0) return 1;
    return a.name.localeCompare(b.name);
  });

  const capped = filtered.length > 300;
  const display = capped ? filtered.slice(0, 300) : filtered;
  const withOrds = filtered.filter(j => j.ordinance_count > 0).length;
  document.getElementById('jur-showing').textContent =
    `${filtered.length} jurisdictions${withOrds ? ` (${withOrds} with ordinances)` : ''}${capped ? ' — showing first 300' : ''}`;

  const list = document.getElementById('jur-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-data-msg">No jurisdictions match.</div>';
    return;
  }

  list.innerHTML = display.map((j, idx) => {
    const sc = S_COLORS[j.status||'0_passes'];
    const statusLabel = S_LABELS[j.status||'0_passes'];
    const fips = [j.county_fips, j.place_fips].filter(Boolean).join(' / ');
    const ordBadge = j.ordinance_count > 0 ? `<span class="jur-badge" style="background:var(--accent);color:#fff">${j.ordinance_count} ord</span>` : '';

    const passes = Array.isArray(j.passes) ? j.passes : [];
    let detailHtml = '';

    if (passes.length > 0) {
      const tabColors = ['#6c8cff', '#f59e0b', '#10b981'];
      const uid = `j-${idx}`;
      const passByNum = {};
      for (const p of passes) passByNum[p.pipeline_pass || 0] = p;
      const slots = [{ num:1, label:'Search 1', color:tabColors[0] }, { num:2, label:'Search 2', color:tabColors[1] }, { num:3, label:'Tiebreaker', color:tabColors[2] }];
      const firstAvail = slots.findIndex(s => passByNum[s.num]);

      const tabs = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})" style="opacity:0.35;cursor:default"><span class="pass-dot" style="background:#555"></span>${s.label}</div>`;
        const errored = isErrorNote(p.search_notes);
        const dotColor = errored ? '#f87171' : p.ordinances.length > 0 ? s.color : '#999';
        return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})"><span class="pass-dot" style="background:${dotColor}"></span>${s.label}</div>`;
      }).join('');

      const panels = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-panel${active}"><div class="pass-empty" style="color:#555">Not yet searched</div></div>`;
        if (isErrorNote(p.search_notes)) return `<div class="pass-panel${active}"><div class="pass-note" style="color:var(--red);background:rgba(248,113,113,0.08)">Search failed. This pass needs to be re-run.</div></div>`;
        const noteHtml = p.search_notes ? `<div class="pass-note">${esc(p.search_notes)}</div>` : '';
        if (p.ordinances.length === 0) return `<div class="pass-panel${active}">${noteHtml}<div class="pass-empty">No local tobacco ordinances found.</div></div>`;
        return `<div class="pass-panel${active}">${noteHtml}<div class="pass-summary-pill" style="background:${s.color}22;color:${s.color}">${p.ordinances.length} ordinance${p.ordinances.length!==1?'s':''}</div>${p.ordinances.map(o => buildOrdCard(o)).join('')}</div>`;
      }).join('');

      detailHtml = `<div data-uid="${uid}"><div class="pass-tabs">${tabs}</div>${panels}</div>`;
    } else if (j.ordinances?.length > 0) {
      detailHtml = j.ordinances.map(o => buildOrdCard(o)).join('');
    } else {
      detailHtml = `<div style="font-size:0.75rem;color:var(--muted);padding:4px 0">${j.status === '0_passes' ? 'Not yet searched' : 'No local tobacco ordinances found.'}</div>`;
    }

    return `<div class="jur-item" onclick="this.classList.toggle('expanded')">
      <div class="jur-top">
        <div class="jur-name">${esc(j.name)}${ordBadge}</div>
        <div class="jur-status" style="background:${sc}22;color:${sc}">${statusLabel}</div>
      </div>
      ${fips ? `<div class="jur-meta">FIPS ${fips}</div>` : ''}
      <div class="jur-detail">${detailHtml}</div>
    </div>`;
  }).join('');
}

// Global function for tab switching (called from onclick)
window.switchTab = function(uid, idx) {
  const container = document.querySelector(`[data-uid="${uid}"]`);
  if (!container) return;
  container.querySelectorAll('.pass-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  container.querySelectorAll('.pass-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
};
</script>


<div class="site-footer">
  Data from three-pass blind search pipeline &middot;
  <a href="https://github.com/tlcaputi/tobacco-ordinances">Source code</a>
</div>
</body>
</html>

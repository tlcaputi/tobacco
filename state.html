<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">State &mdash; Tobacco Control Laws</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e1e4ed;
    --muted: #8b8fa3; --accent: #6c8cff; --green: #34d399; --yellow: #fbbf24;
    --orange: #fb923c; --red: #f87171; --purple: #a78bfa; --blue: #60a5fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .site-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-bottom: 1px solid var(--border); background: var(--card); }
  .nav-brand { font-size: 1rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .nav-brand:hover { color: var(--accent); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: all 0.15s; }
  .nav-link:hover { color: var(--text); background: rgba(108,140,255,0.08); }
  .nav-link.active { color: var(--accent); background: rgba(108,140,255,0.12); }

  .page { max-width: 1100px; margin: 0 auto; padding: 24px 28px 60px; }

  .breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .state-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .state-name { font-size: 1.8rem; font-weight: 700; }
  .state-badge { display: inline-block; padding: 4px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 22px; }
  @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-val { font-size: 1.6rem; font-weight: 700; }
  .stat-lbl { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  .stat-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 2px; }

  .progress-bar-section { margin-bottom: 22px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 22px; }
  @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }

  .map-section { position: relative; margin-bottom: 22px; }
  #map-container svg { width: 100%; }
  .map-hint { font-size: 0.63rem; color: var(--muted); text-align: center; margin-top: 4px; }
  .tooltip {
    position: absolute; background: #1e2030; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; font-size: 0.78rem; pointer-events: none; z-index: 10; display: none; max-width: 320px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .tt-name { font-weight: 700; font-size: 0.88rem; }
  .tt-badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 0.63rem; font-weight: 600; margin-left: 5px; vertical-align: middle; }
  .tt-row { margin-top: 3px; color: var(--muted); font-size: 0.72rem; }
  .tt-type { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.63rem; font-weight: 600; margin: 1px 2px; }

  /* Policy type bar chart */
  .bar-row { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; margin-bottom: 4px; }
  .bar-label { width: 160px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .bar-track { flex: 1; height: 18px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-val { width: 32px; font-size: 0.7rem; color: var(--muted); }

  /* Jurisdiction list */
  .jur-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .jur-search { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.82rem; }
  .jur-search:focus { outline: none; border-color: var(--accent); }
  .jur-filter-btn { padding: 5px 12px; border-radius: 16px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.15s; }
  .jur-filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .jur-filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,0.1); }
  .jur-showing { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; }

  .jur-list { display: grid; gap: 6px; }
  .jur-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s; }
  .jur-item:hover { border-color: var(--accent); }
  .jur-item.expanded { border-color: var(--accent); background: rgba(108,140,255,0.03); }
  .jur-top { display: flex; align-items: center; justify-content: space-between; }
  .jur-name { font-weight: 600; font-size: 0.85rem; }
  .jur-badge { display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-left: 6px; }
  .jur-status { font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
  .jur-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .jur-detail { display: none; margin-top: 10px; }
  .jur-item.expanded .jur-detail { display: block; }

  /* Pass tabs */
  .pass-tabs { display: flex; gap: 0; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
  .pass-tab { padding: 5px 12px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 5px 5px 0 0; color: var(--muted); background: none; transition: all 0.12s; }
  .pass-tab:hover { color: var(--text); background: rgba(108,140,255,0.04); }
  .pass-tab.active { color: var(--accent); border-color: var(--border); background: var(--card); margin-bottom: -1px; }
  .pass-tab .pass-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .pass-panel { display: none; }
  .pass-panel.active { display: block; }
  .pass-note { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-bottom: 6px; padding: 4px 8px; background: rgba(108,140,255,0.04); border-radius: 4px; }
  .pass-empty { font-size: 0.75rem; color: var(--muted); padding: 6px 0; }
  .pass-summary-pill { font-size: 0.68rem; padding: 2px 10px; border-radius: 10px; font-weight: 600; margin-bottom: 8px; display: inline-block; }

  .ord-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 5px; font-size: 0.78rem; }
  .ord-type { font-weight: 600; color: var(--accent); }
  .ord-desc { color: var(--text); margin-top: 3px; opacity: 0.85; }
  .ord-meta { color: var(--muted); margin-top: 3px; font-size: 0.72rem; }
  .ord-meta a { color: var(--blue); text-decoration: none; }
  .ord-meta a:hover { text-decoration: underline; }

  .footer { text-align: center; padding: 20px; font-size: 0.72rem; color: var(--muted); border-top: 1px solid var(--border); }
  .footer a { color: var(--accent); text-decoration: none; }

  .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 1rem; }
</style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="nav-brand">Tobacco Control Laws Dataset</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">About</a>
    <a href="progress.html" class="nav-link">Pipeline</a>
    <a href="policies.html" class="nav-link">Policy Maps</a>
  </div>
</nav>

<div class="page" id="page">
  <div class="loading" id="loading">Loading state data...</div>
</div>

<div class="footer">
  <a href="progress.html">&larr; All states</a> &middot;
  Data from three-pass blind search pipeline &middot;
  <a href="https://github.com/tlcaputi/tobacco-ordinances">Source</a>
</div>

<script>
const FIPS_TO_STATE = {
  "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE",
  "11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA",
  "20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN",
  "28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM",
  "36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI",
  "45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA",
  "54":"WV","55":"WI","56":"WY"
};
const S_COLORS = { done:'#34d399', needs_tiebreaker:'#a78bfa', '1_pass':'#60a5fa', '0_passes':'#1e2030' };
const S_LABELS = { done:'Complete', needs_tiebreaker:'Needs 3rd Pass', '1_pass':'Needs 2nd Pass', '0_passes':'Not Started' };
const C_COLORS = { all_done:'#34d399', some_done:'#2a8a6a', some_started:'#3b5998', not_started:'#1a1f2e' };
const C_LABELS = { all_done:'All Complete', some_done:'Some Complete', some_started:'Some Started', not_started:'Not Started' };
const TYPE_COLORS = ['#6c8cff','#34d399','#fbbf24','#a78bfa','#fb923c','#f87171','#60a5fa','#f472b6','#22d3ee','#84cc16'];

const params = new URLSearchParams(window.location.search);
const stateAbbrev = (params.get('st') || '').toUpperCase();

if (!stateAbbrev) {
  document.getElementById('loading').innerHTML = 'No state specified. <a href="progress.html" style="color:var(--accent)">Browse all states</a>';
}

let DATA = null, US_TOPO = null;
let jurFilter = ''; // search text
let jurShowFilter = 'all'; // 'all', 'with_ords', 'no_ords'

Promise.all([
  fetch('dashboard_data.json').then(r => r.json()),
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(r => r.json())
]).then(([data, us]) => {
  DATA = data;
  US_TOPO = us;
  if (stateAbbrev) renderPage();
});

function renderPage() {
  const s = DATA.states[stateAbbrev];
  if (!s) {
    document.getElementById('loading').innerHTML = `State "${esc(stateAbbrev)}" not found. <a href="progress.html" style="color:var(--accent)">Browse all states</a>`;
    return;
  }

  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const js = s.jur_status || {};
  const total = s.jurisdiction_count || 0;
  const done = js.done || 0;
  const pctDone = total > 0 ? (done / total * 100) : 0;

  // Pipeline status
  const statusLabel = s.status === 'done' ? 'Complete' :
    s.status === 'needs_tiebreaker' ? 'Needs Tiebreaker' :
    s.status === '1_pass' ? 'Pass 1 Done' : 'Not Started';
  const statusColor = S_COLORS[s.status] || S_COLORS['0_passes'];

  document.title = `${s.name} — Tobacco Control Laws`;
  document.getElementById('page-title').textContent = `${s.name} — Tobacco Control Laws`;

  // Ordinance type breakdown
  const typeCounts = {};
  for (const j of jurs) {
    for (const o of (j.ordinances || [])) {
      const lt = o.law_type || 'unknown';
      typeCounts[lt] = (typeCounts[lt] || 0) + 1;
    }
  }
  const typeEntries = Object.entries(typeCounts).sort((a,b) => b[1] - a[1]);
  const maxType = typeEntries[0]?.[1] || 1;

  // Counties with ordinances
  const countiesWithOrds = new Set();
  for (const j of jurs) {
    if (j.ordinance_count > 0 && j.county_fips) countiesWithOrds.add(j.county_fips);
  }

  const page = document.getElementById('page');
  page.innerHTML = `
    <div class="breadcrumb">
      <a href="index.html">Home</a> &rsaquo;
      <a href="progress.html">Pipeline</a> &rsaquo;
      ${s.name}
    </div>

    <div class="state-header">
      <div class="state-name">${s.name}</div>
      <div class="state-badge" style="background:${statusColor}22;color:${statusColor}">${statusLabel}</div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" style="color:var(--green)">${done.toLocaleString()}</div>
        <div class="stat-lbl">Jurisdictions Complete</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.max(pctDone,0.5)}%;background:var(--green)"></div></div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:var(--text)">${total.toLocaleString()}</div>
        <div class="stat-lbl">Total Jurisdictions</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:var(--accent)">${s.ordinances_found}</div>
        <div class="stat-lbl">Ordinances Found</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:var(--purple)">${jurs.filter(j => j.ordinance_count > 0).length}</div>
        <div class="stat-lbl">Jurisdictions w/ Ordinances</div>
      </div>
    </div>

    <div class="progress-bar-section" id="progress-bar"></div>

    <div class="map-section">
      <div id="map-container"></div>
      <div class="map-hint">Counties colored by search completion. Dots show jurisdictions with ordinances.</div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">Ordinances by Type</div>
        <div id="type-chart">${typeEntries.length === 0 ? '<div style="color:var(--muted);font-size:0.78rem">No ordinances found yet</div>' :
          typeEntries.map(([k,v], i) => {
            const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxType*100).toFixed(0)}%;background:${TYPE_COLORS[i%TYPE_COLORS.length]}"></div></div><div class="bar-val">${v}</div></div>`;
          }).join('')
        }</div>
      </div>
      <div class="card">
        <div class="card-title">Pipeline Status</div>
        <div style="font-size:0.82rem;margin-bottom:8px">
          ${s.has_pass1 ? '<span style="color:var(--green);font-weight:600">Pass 1</span>' : '<span style="color:var(--muted)">Pass 1</span>'}
          &rarr;
          ${s.has_pass2 ? '<span style="color:var(--green);font-weight:600">Pass 2</span>' : '<span style="color:var(--muted)">Pass 2</span>'}
          &rarr;
          ${s.has_tiebreaker ? '<span style="color:var(--green);font-weight:600">Tiebreaker</span>' : '<span style="color:var(--muted)">Tiebreaker</span>'}
        </div>
        <div style="font-size:0.78rem;color:var(--muted);line-height:1.7">
          ${done > 0 ? `<div><span style="color:var(--green);font-weight:600">${done.toLocaleString()}</span> complete (${pctDone.toFixed(1)}%)</div>` : ''}
          ${(js.needs_tiebreaker||0) > 0 ? `<div><span style="color:var(--purple);font-weight:600">${js.needs_tiebreaker}</span> need tiebreaker</div>` : ''}
          ${(js['1_pass']||0) > 0 ? `<div><span style="color:var(--blue);font-weight:600">${js['1_pass']}</span> need 2nd pass</div>` : ''}
          ${(js['0_passes']||0) > 0 ? `<div><span style="color:var(--muted)">${js['0_passes'].toLocaleString()}</span> not started</div>` : ''}
        </div>
      </div>
    </div>

    <div style="margin-bottom: 18px">
      <div class="card-title" style="font-size:0.95rem;margin-bottom:12px">Jurisdictions</div>
      <div class="jur-controls">
        <input type="text" class="jur-search" id="jur-search" placeholder="Search jurisdictions...">
        <button class="jur-filter-btn active" data-filter="all">All (${total})</button>
        <button class="jur-filter-btn" data-filter="with_ords">With ordinances (${jurs.filter(j=>j.ordinance_count>0).length})</button>
        <button class="jur-filter-btn" data-filter="no_ords">No ordinances (${jurs.filter(j=>j.ordinance_count===0 && j.status==='done').length})</button>
      </div>
      <div class="jur-showing" id="jur-showing"></div>
      <div class="jur-list" id="jur-list"></div>
    </div>
  `;

  // Progress bar
  const statuses = [
    { key: 'done', label: 'Complete', color: '#34d399' },
    { key: 'needs_tiebreaker', label: 'Need 3rd Pass', color: '#a78bfa' },
    { key: '1_pass', label: 'Need 2nd Pass', color: '#60a5fa' },
    { key: '0_passes', label: 'Not Started', color: '#3a4050' },
  ];
  const segments = statuses.map(st => ({ ...st, n: js[st.key] || 0, pct: total > 0 ? (js[st.key]||0)/total*100 : 0 }));
  document.getElementById('progress-bar').innerHTML = `
    <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px">
      ${segments.map(seg => seg.pct > 0 ? `<div style="width:${seg.pct}%;background:${seg.color}" title="${seg.label}: ${seg.n}"></div>` : '').join('')}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:0.72rem;color:var(--muted)">
      ${segments.filter(seg => seg.n > 0).map(seg => `<span><span style="color:${seg.color};font-weight:600">${seg.n.toLocaleString()}</span> ${seg.label}</span>`).join('')}
    </div>
  `;

  renderStateMap();
  renderJurList();

  // Event listeners
  document.getElementById('jur-search').oninput = (e) => { jurFilter = e.target.value; renderJurList(); };
  document.querySelectorAll('.jur-filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.jur-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      jurShowFilter = btn.dataset.filter;
      renderJurList();
    };
  });
}

function renderStateMap() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = Math.min(width * 0.65, 500);
  const tooltip = document.getElementById('tooltip');

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  const g = svg.append('g');

  const stFips = Object.entries(FIPS_TO_STATE).find(([k,v]) => v === stateAbbrev)?.[0];
  if (!stFips) return;

  const allCounties = topojson.feature(US_TOPO, US_TOPO.objects.counties).features;
  const stateCounties = allCounties.filter(d => d.id.toString().padStart(5,'0').startsWith(stFips));
  if (stateCounties.length === 0) return;

  const stateFC = { type: 'FeatureCollection', features: stateCounties };
  const projection = d3.geoAlbersUsa().fitSize([width - 30, height - 30], stateFC);
  if (!projection) return;
  const path = d3.geoPath().projection(projection);

  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];

  // Build county -> jurisdictions map
  const countyJurs = {};
  for (const cty of stateCounties) {
    countyJurs[cty.id.toString().padStart(5,'0')] = [];
  }
  for (const j of jurs) {
    const cf = j.county_fips;
    if (cf && countyJurs[cf] !== undefined) countyJurs[cf].push(j);
  }

  // County names
  const countyNames = {};
  for (const j of jurs) {
    if (j.county_fips && j.name && j.name.includes('County')) {
      countyNames[j.county_fips] = j.name.replace(/, [A-Za-z]+$/, '');
    }
  }

  function computeStatus(statuses) {
    if (statuses.length === 0) return 'not_started';
    const allDone = statuses.every(s => s === 'done');
    const hasDone = statuses.some(s => s === 'done');
    const hasStarted = statuses.some(s => s === 'done' || s === 'needs_tiebreaker' || s === '1_pass');
    if (allDone) return 'all_done';
    if (hasDone) return 'some_done';
    if (hasStarted) return 'some_started';
    return 'not_started';
  }

  // Draw counties
  g.selectAll('.county')
    .data(stateCounties)
    .join('path')
    .attr('d', path)
    .attr('fill', d => {
      const cfips = d.id.toString().padStart(5,'0');
      const statuses = (countyJurs[cfips] || []).map(j => j.status || '0_passes');
      return C_COLORS[computeStatus(statuses)];
    })
    .attr('stroke', '#3a4050')
    .attr('stroke-width', 0.5)
    .attr('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke', '#aaa').attr('stroke-width', 1.5);
      const cfips = d.id.toString().padStart(5,'0');
      const cjurs = countyJurs[cfips] || [];
      const cname = countyNames[cfips] || `County ${cfips}`;
      const ordCount = cjurs.reduce((s,j) => s + (j.ordinance_count||0), 0);
      tooltip.innerHTML = `
        <div class="tt-name">${cname}</div>
        <div class="tt-row">${cjurs.length} jurisdiction${cjurs.length!==1?'s':''} &middot; ${ordCount} ordinance${ordCount!==1?'s':''}</div>
      `;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', '#3a4050').attr('stroke-width', 0.5);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      const cfips = d.id.toString().padStart(5,'0');
      const cname = countyNames[cfips] || '';
      const searchTerm = cname.replace(' County', '').replace(/, .*/, '');
      // Focus search on this county's jurisdictions
      const searchEl = document.getElementById('jur-search');
      if (searchEl) {
        searchEl.value = searchTerm;
        searchEl.dispatchEvent(new Event('input'));
        searchEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

  // State outline
  const allStates = topojson.feature(US_TOPO, US_TOPO.objects.states).features;
  const stateFeature = allStates.find(d => d.id.toString().padStart(2,'0') === stFips);
  if (stateFeature) {
    g.append('path').datum(stateFeature).attr('d', path)
      .attr('fill', 'none').attr('stroke', '#667').attr('stroke-width', 1.2);
  }

  // Dots for jurisdictions with ordinances
  const ordJurs = jurs.filter(j => j.ordinance_count > 0 && j.lat && j.lon);
  const dotData = [];
  for (const j of ordJurs) {
    const pt = projection([j.lon, j.lat]);
    if (pt) dotData.push({ ...j, x: pt[0], y: pt[1] });
  }

  const dotR = dotData.length > 40 ? 4 : dotData.length > 20 ? 5 : 7;
  const sim = d3.forceSimulation(dotData)
    .force('x', d3.forceX(d => d.x).strength(0.9))
    .force('y', d3.forceY(d => d.y).strength(0.9))
    .force('collide', d3.forceCollide(dotR + 1.5))
    .stop();
  for (let i = 0; i < 100; i++) sim.tick();

  const dots = g.selectAll('.ord-dot')
    .data(dotData)
    .join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .attr('cursor', 'pointer');

  dots.append('circle')
    .attr('r', dotR)
    .attr('fill', '#fbbf24')
    .attr('opacity', 0.9)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1);

  const showLabels = dotData.length <= 25;
  dots.append('text')
    .attr('x', dotR + 3).attr('y', 0).attr('dy', '0.35em')
    .attr('fill', '#ccc').attr('font-size', '8px').attr('pointer-events', 'none')
    .attr('opacity', showLabels ? 0.8 : 0)
    .text(d => {
      let n = d.name || '';
      n = n.replace(/, [A-Za-z]+$/, '').replace(/\b(city|town|village|CDP)\b/gi, '').trim();
      return n.length > 20 ? n.slice(0,18) + '..' : n;
    });

  dots.on('mouseover', function(event, d) {
    d3.select(this).select('circle').attr('r', dotR + 3).attr('stroke-width', 2);
    if (!showLabels) d3.select(this).select('text').attr('opacity', 1);
    d3.select(this).raise();
    const types = (d.ordinances || []).map(o => {
      const lt = (o.law_type||'unknown').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      return `<span class="tt-type" style="background:var(--accent)22;color:var(--accent)">${lt}</span>`;
    });
    tooltip.innerHTML = `
      <div class="tt-name">${esc(d.name)}</div>
      <div class="tt-row">${d.ordinance_count} ordinance${d.ordinance_count!==1?'s':''}</div>
      <div style="margin-top:4px">${types.join('')}</div>
    `;
    tooltip.style.display = 'block';
  })
  .on('mousemove', function(event) {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  })
  .on('mouseout', function() {
    d3.select(this).select('circle').attr('r', dotR).attr('stroke-width', 1);
    if (!showLabels) d3.select(this).select('text').attr('opacity', 0);
    tooltip.style.display = 'none';
  })
  .on('click', function(event, d) {
    const searchEl = document.getElementById('jur-search');
    if (searchEl) {
      searchEl.value = d.name.split(',')[0];
      searchEl.dispatchEvent(new Event('input'));
      searchEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  // County labels
  g.selectAll('.county-label')
    .data(stateCounties)
    .join('text')
    .attr('x', d => path.centroid(d)[0])
    .attr('y', d => path.centroid(d)[1])
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('fill', '#ffffff88').attr('font-size', '7px').attr('pointer-events', 'none')
    .text(d => {
      const cfips = d.id.toString().padStart(5,'0');
      const n = countyNames[cfips];
      if (!n) return '';
      const bounds = path.bounds(d);
      if ((bounds[1][0] - bounds[0][0]) < 40) return '';
      return n.replace(' County', '').replace(/, .*/, '');
    });
}

function isErrorNote(text) {
  return text && /\[ERROR:/i.test(text);
}

function renderJurList() {
  const jurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const q = jurFilter.toLowerCase();

  let filtered = jurs;
  if (q) filtered = filtered.filter(j => j.name.toLowerCase().includes(q) || (j.county_fips && j.county_fips.includes(q)));
  if (jurShowFilter === 'with_ords') filtered = filtered.filter(j => j.ordinance_count > 0);
  if (jurShowFilter === 'no_ords') filtered = filtered.filter(j => j.ordinance_count === 0 && j.status === 'done');

  // Sort: with ordinances first, then alphabetical
  filtered.sort((a,b) => {
    if (a.ordinance_count > 0 && b.ordinance_count === 0) return -1;
    if (b.ordinance_count > 0 && a.ordinance_count === 0) return 1;
    return a.name.localeCompare(b.name);
  });

  const capped = filtered.length > 300;
  const display = capped ? filtered.slice(0, 300) : filtered;
  const withOrds = filtered.filter(j => j.ordinance_count > 0).length;

  document.getElementById('jur-showing').textContent =
    `${filtered.length} jurisdictions${withOrds ? ` (${withOrds} with ordinances)` : ''}${capped ? ' — showing first 300' : ''}`;

  const list = document.getElementById('jur-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:0.82rem">No jurisdictions match.</div>`;
    return;
  }

  list.innerHTML = display.map((j, idx) => {
    const sc = S_COLORS[j.status||'0_passes'];
    const statusLabel = S_LABELS[j.status||'0_passes'];
    const fips = [j.county_fips, j.place_fips].filter(Boolean).join(' / ');
    const ordBadge = j.ordinance_count > 0
      ? `<span class="jur-badge" style="background:var(--accent);color:#fff">${j.ordinance_count} ord</span>` : '';

    // Build detail view
    const passes = Array.isArray(j.passes) ? j.passes : [];
    let detailHtml = '';

    if (passes.length > 0) {
      const tabColors = ['#6c8cff', '#f59e0b', '#10b981'];
      const uid = `j-${idx}`;
      const passByNum = {};
      for (const p of passes) passByNum[p.pipeline_pass || 0] = p;

      const slots = [
        { num: 1, label: 'Search 1', color: tabColors[0] },
        { num: 2, label: 'Search 2', color: tabColors[1] },
        { num: 3, label: 'Tiebreaker', color: tabColors[2] },
      ];
      const firstAvail = slots.findIndex(s => passByNum[s.num]);

      const tabs = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})" style="opacity:0.35;cursor:default"><span class="pass-dot" style="background:#555"></span>${s.label}</div>`;
        const errored = isErrorNote(p.search_notes);
        const dotColor = errored ? '#f87171' : p.ordinances.length > 0 ? s.color : '#999';
        const title = errored ? 'Search failed — needs re-run' : `${p.ordinances.length} ordinances`;
        return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})" title="${title}"><span class="pass-dot" style="background:${dotColor}"></span>${s.label}</div>`;
      }).join('');

      const panels = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-panel${active}"><div class="pass-empty" style="color:#555">Not yet searched</div></div>`;
        if (isErrorNote(p.search_notes)) return `<div class="pass-panel${active}"><div class="pass-note" style="color:var(--red);background:rgba(248,113,113,0.08)">Search failed (timed out). This pass needs to be re-run.</div></div>`;
        const noteHtml = p.search_notes ? `<div class="pass-note">${esc(p.search_notes)}</div>` : '';
        if (p.ordinances.length === 0) return `<div class="pass-panel${active}">${noteHtml}<div class="pass-empty">Searched &mdash; no local tobacco ordinances found.</div></div>`;
        const ordsHtml = p.ordinances.map(o => buildOrdCard(o)).join('');
        return `<div class="pass-panel${active}">${noteHtml}<div class="pass-summary-pill" style="background:${s.color}22;color:${s.color}">${p.ordinances.length} ordinance${p.ordinances.length!==1?'s':''}</div>${ordsHtml}</div>`;
      }).join('');

      detailHtml = `<div data-uid="${uid}"><div class="pass-tabs">${tabs}</div>${panels}</div>`;
    } else if (j.ordinances && j.ordinances.length > 0) {
      detailHtml = j.ordinances.map(o => buildOrdCard(o)).join('');
    } else {
      const msg = j.status === '0_passes' ? 'Not yet searched' : 'No local tobacco ordinances found.';
      detailHtml = `<div style="font-size:0.75rem;color:var(--muted);padding:4px 0">${msg}</div>`;
    }

    return `<div class="jur-item" onclick="this.classList.toggle('expanded')">
      <div class="jur-top">
        <div class="jur-name">${esc(j.name)}${ordBadge}</div>
        <div class="jur-status" style="background:${sc}22;color:${sc}">${statusLabel}</div>
      </div>
      ${fips ? `<div class="jur-meta">FIPS ${fips}</div>` : ''}
      <div class="jur-detail">${detailHtml}</div>
    </div>`;
  }).join('');
}

function buildOrdCard(o) {
  const lt = (o.law_type||'unknown').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  const parts = [];
  if (o.effective_date) parts.push(`Effective ${esc(o.effective_date)}`);
  else if (o.adoption_date) parts.push(`Adopted ${esc(o.adoption_date)}`);
  if (o.ordinance_number) parts.push(`Ord. ${esc(o.ordinance_number)}`);
  if (o.source_url) parts.push(`<a href="${esc(o.source_url)}" target="_blank" onclick="event.stopPropagation()">${truncUrl(o.source_url)}</a>`);
  return `<div class="ord-card">
    <div class="ord-type">${lt}</div>
    ${o.description ? `<div class="ord-desc">${esc(o.description)}</div>` : ''}
    ${parts.length ? `<div class="ord-meta">${parts.join(' &middot; ')}</div>` : ''}
  </div>`;
}

function switchTab(uid, idx) {
  const container = document.querySelector(`[data-uid="${uid}"]`);
  if (!container) return;
  container.querySelectorAll('.pass-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  container.querySelectorAll('.pass-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function truncUrl(u) {
  try { const url=new URL(u); return url.hostname+(url.pathname.length>25?url.pathname.slice(0,25)+'...':url.pathname); }
  catch { return u.length>45?u.slice(0,45)+'...':u; }
}
</script>

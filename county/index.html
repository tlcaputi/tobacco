<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>County Detail &mdash; Tobacco Control Laws</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

</head>
<body>
<nav class="site-nav">
  <a href="/" class="nav-brand">Tobacco Control Laws Dataset</a>
  <div class="nav-links">
    <a href="/" class="nav-link">About</a>
    <a href="/coverage/" class="nav-link">Coverage</a>
    <a href="/policies/" class="nav-link">Policy Maps</a>
  </div>
</nav>


<div class="page" id="page">
  <div class="no-data-msg" id="loading">Loading county data...</div>
</div>

<script type="module">
import {
  FIPS_TO_STATE, S_COLORS, S_LABELS, C_COLORS, C_LABELS, TYPE_COLORS, LAW_TYPES,
  loadData, loadPlaces, esc, truncUrl, isErrorNote, computeCountyStatus,
  getStateFips, getStateCounties, assignJursToCounties, buildCountyNames,
  buildOrdCard, categorize, getTypeInfo
} from '/js/shared.js';

const params = new URLSearchParams(window.location.search);
const stateAbbrev = (params.get('st') || '').toUpperCase();
const countyFips = params.get('fips') || '';

if (!stateAbbrev || !countyFips) {
  document.getElementById('loading').innerHTML = 'Missing state or county. <a href="/coverage/">Browse all states</a>';
}

const { data: DATA, us: US_TOPO } = await loadData();
const stFips = getStateFips(stateAbbrev);

// Load place boundaries for this state
const placesTopo = stFips ? await loadPlaces(stFips) : null;

if (stateAbbrev && countyFips) renderPage();

function renderPage() {
  const s = DATA.states[stateAbbrev];
  if (!s) {
    document.getElementById('loading').innerHTML = `State "${esc(stateAbbrev)}" not found. <a href="/coverage/">Browse all states</a>`;
    return;
  }

  // Get all jurisdictions for this state, filter to this county
  const allJurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const stateCounties = getStateCounties(US_TOPO, stFips);
  const countyJursMap = assignJursToCounties(allJurs, stateCounties);
  const jurs = countyJursMap[countyFips] || [];

  if (jurs.length === 0) {
    document.getElementById('loading').innerHTML = `No jurisdictions found for county FIPS ${esc(countyFips)} in ${esc(s.name)}. <a href="/state/?st=${stateAbbrev}">Back to ${esc(s.name)}</a>`;
    return;
  }

  // County name
  const countyNames = buildCountyNames(allJurs);
  const countyName = countyNames[countyFips] || `County ${countyFips}`;

  // Stats
  const total = jurs.length;
  const done = jurs.filter(j => j.status === 'done').length;
  const withOrds = jurs.filter(j => j.ordinance_count > 0).length;
  const ordCount = jurs.reduce((s, j) => s + (j.ordinance_count || 0), 0);
  const pctDone = total > 0 ? (done / total * 100) : 0;

  const statuses = jurs.map(j => j.status || '0_passes');
  const aggStatus = computeCountyStatus(statuses);
  const statusColor = C_COLORS[aggStatus];
  const statusLabel = C_LABELS[aggStatus];

  document.title = `${countyName} — ${s.name} — Tobacco Control Laws`;

  // Ordinance type counts
  const typeCounts = {};
  for (const j of jurs) for (const o of (j.ordinances || [])) {
    const lt = o.law_type || 'unknown';
    typeCounts[lt] = (typeCounts[lt] || 0) + 1;
  }
  const typeEntries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
  const maxType = typeEntries[0]?.[1] || 1;

  // Status breakdown
  const statusCounts = { done: 0, needs_tiebreaker: 0, '1_pass': 0, '0_passes': 0 };
  for (const st of statuses) statusCounts[st] = (statusCounts[st] || 0) + 1;

  const page = document.getElementById('page');
  page.innerHTML = `
    <div class="breadcrumb">
      <a href="/">Home</a> &rsaquo;
      <a href="/coverage/">Coverage</a> &rsaquo;
      <a href="/state/?st=${stateAbbrev}">${s.name}</a> &rsaquo;
      ${countyName}
    </div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap">
      <h1 style="font-size:1.8rem;font-weight:700">${countyName}</h1>
      <span style="display:inline-block;padding:4px 14px;border-radius:6px;font-size:0.78rem;font-weight:600;background:${statusColor}22;color:${statusColor}">${statusLabel}</span>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" style="color:var(--green)">${done}</div><div class="stat-lbl">Complete</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.max(pctDone,0.5)}%;background:var(--green)"></div></div></div>
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Jurisdictions</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent)">${ordCount}</div><div class="stat-lbl">Ordinances Found</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--purple)">${withOrds}</div><div class="stat-lbl">With Ordinances</div></div>
    </div>

    <div id="progress-bar" style="margin-bottom:18px"></div>

    <div class="map-section" style="margin-bottom:22px">
      <div id="map-container"></div>
      <div class="map-hint" id="map-hint">Jurisdiction boundaries within ${countyName}. Click a place to see details.</div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    ${typeEntries.length > 0 ? `
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Ordinances by Type</div>
      <div id="type-chart">${typeEntries.map(([k, v], i) => {
        const label = k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(v / maxType * 100).toFixed(0)}%;background:${TYPE_COLORS[i % TYPE_COLORS.length]}"></div></div><div class="bar-val">${v}</div></div>`;
      }).join('')}</div>
    </div>` : ''}

    <div>
      <div class="card-title" style="font-size:0.95rem;margin-bottom:12px">Jurisdictions (${total})</div>
      <div id="jur-list"></div>
    </div>
  `;

  // Progress bar
  const barStatuses = [
    { key: 'done', label: 'Complete', color: '#34d399' },
    { key: 'needs_tiebreaker', label: 'Need 3rd Pass', color: '#a78bfa' },
    { key: '1_pass', label: 'Need 2nd Pass', color: '#60a5fa' },
    { key: '0_passes', label: 'Not Started', color: '#3a4050' },
  ];
  const segs = barStatuses.map(st => ({ ...st, n: statusCounts[st.key] || 0, pct: total > 0 ? (statusCounts[st.key] || 0) / total * 100 : 0 }));
  document.getElementById('progress-bar').innerHTML = `
    <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px">
      ${segs.map(seg => seg.pct > 0 ? `<div style="width:${seg.pct}%;background:${seg.color}"></div>` : '').join('')}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:0.72rem;color:var(--muted)">
      ${segs.filter(seg => seg.n > 0).map(seg => `<span><span style="color:${seg.color};font-weight:600">${seg.n}</span> ${seg.label}</span>`).join('')}
    </div>`;

  renderMap();
  renderJurList();
}

function renderMap() {
  const container = document.getElementById('map-container');
  const width = container.clientWidth;
  const height = Math.min(width * 0.7, 500);
  const tooltip = document.getElementById('tooltip');

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  const g = svg.append('g');

  // Find county boundary from US topo
  const allCounties = topojson.feature(US_TOPO, US_TOPO.objects.counties).features;
  const countyFeature = allCounties.find(d => d.id.toString().padStart(5, '0') === countyFips);
  if (!countyFeature) return;

  // Fit projection to county
  const projection = d3.geoMercator().fitSize([width - 40, height - 40], countyFeature);
  const path = d3.geoPath().projection(projection);

  // Draw county background
  g.append('path').datum(countyFeature)
    .attr('d', path).attr('fill', '#141720').attr('stroke', '#667').attr('stroke-width', 1.5);

  // Get jurisdictions for this county
  const allJurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const stateCounties = getStateCounties(US_TOPO, stFips);
  const countyJursMap = assignJursToCounties(allJurs, stateCounties);
  const jurs = countyJursMap[countyFips] || [];

  // Build lookup: place_fips -> jurisdiction
  const placeIdToJur = {};
  for (const j of jurs) {
    if (j.place_fips) placeIdToJur[j.place_fips] = j;
  }

  // Draw ALL Census place boundaries in this county
  let placesDrawn = 0;
  const matchedPlaceFips = new Set();
  if (placesTopo) {
    const layerName = Object.keys(placesTopo.objects)[0];
    const allPlaces = topojson.feature(placesTopo, placesTopo.objects[layerName]).features;

    // Show ALL places in this county (using COUNTYFP property), not just tracked ones
    const countyPlaces = allPlaces.filter(p => p.properties.COUNTYFP === countyFips);
    placesDrawn = countyPlaces.length;

    // Track which place_fips have boundaries
    for (const p of countyPlaces) matchedPlaceFips.add(p.properties.GEOID);

    g.selectAll('.place-boundary')
      .data(countyPlaces).join('path')
      .attr('d', path)
      .attr('fill', d => {
        const j = placeIdToJur[d.properties.GEOID];
        if (!j) return '#1e2235'; // untracked place — dim neutral
        if (j.ordinance_count > 0) return '#6c8cff33';
        const sc = S_COLORS[j.status || '0_passes'];
        return sc + '44';
      })
      .attr('stroke', d => {
        const j = placeIdToJur[d.properties.GEOID];
        if (!j) return '#2a3040'; // untracked — subtle border
        if (j.ordinance_count > 0) return '#6c8cff';
        return S_COLORS[j.status || '0_passes'] || '#3a4050';
      })
      .attr('stroke-width', d => placeIdToJur[d.properties.GEOID] ? 1.2 : 0.5)
      .attr('cursor', 'pointer')
      .on('mouseover', function(event, d) {
        d3.select(this).attr('stroke-width', 2.5).attr('stroke', '#fff');
        const j = placeIdToJur[d.properties.GEOID];
        const name = j ? j.name : (d.properties.NAMELSAD || d.properties.NAME);
        const status = j ? (S_LABELS[j.status || '0_passes']) : 'Not in dataset';
        const ords = j ? j.ordinance_count || 0 : 0;
        tooltip.innerHTML = `
          <div class="tt-name">${esc(name)}</div>
          <div class="tt-row">${status}${j ? ` &middot; ${ords} ordinance${ords !== 1 ? 's' : ''}` : ''}</div>`;
        tooltip.style.display = 'block';
      })
      .on('mousemove', function(event) {
        const rect = container.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
        tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
      })
      .on('mouseout', function(event, d) {
        const j = placeIdToJur[d.properties.GEOID];
        d3.select(this)
          .attr('stroke-width', j ? 1.2 : 0.5)
          .attr('stroke', !j ? '#2a3040' :
            j.ordinance_count > 0 ? '#6c8cff' : S_COLORS[j.status || '0_passes'] || '#3a4050');
        tooltip.style.display = 'none';
      })
      .on('click', function(event, d) {
        const j = placeIdToJur[d.properties.GEOID];
        if (j) scrollToJur(j.name);
      });

    // Labels for larger places
    g.selectAll('.place-label')
      .data(countyPlaces.filter(d => {
        const bounds = path.bounds(d);
        return (bounds[1][0] - bounds[0][0]) > 30;
      }))
      .join('text')
      .attr('x', d => path.centroid(d)[0])
      .attr('y', d => path.centroid(d)[1])
      .attr('text-anchor', 'middle').attr('dy', '0.35em')
      .attr('fill', d => placeIdToJur[d.properties.GEOID] ? '#ffffffbb' : '#ffffff55')
      .attr('font-size', '8px').attr('pointer-events', 'none')
      .text(d => {
        const name = d.properties.NAME || '';
        return name.length > 18 ? name.slice(0, 16) + '..' : name;
      });
  }

  // Dots for tracked jurisdictions without place boundaries (counties, unmatched)
  const jurisWithoutBoundary = jurs.filter(j => {
    if (!j.place_fips) return true;
    return !matchedPlaceFips.has(j.place_fips);
  });

  const dotData = [];
  for (const j of jurisWithoutBoundary) {
    if (!j.lat || !j.lon) continue;
    const pt = projection([j.lon, j.lat]);
    if (pt) dotData.push({ ...j, x: pt[0], y: pt[1] });
  }

  if (dotData.length > 0) {
    const dotR = dotData.length > 20 ? 4 : dotData.length > 10 ? 5 : 7;
    const sim = d3.forceSimulation(dotData)
      .force('x', d3.forceX(d => d.x).strength(0.9))
      .force('y', d3.forceY(d => d.y).strength(0.9))
      .force('collide', d3.forceCollide(dotR + 2)).stop();
    for (let i = 0; i < 80; i++) sim.tick();

    const dots = g.selectAll('.jur-dot').data(dotData).join('g')
      .attr('transform', d => `translate(${d.x},${d.y})`).attr('cursor', 'pointer');

    dots.append('circle').attr('r', dotR)
      .attr('fill', d => d.ordinance_count > 0 ? '#fbbf24' : S_COLORS[d.status || '0_passes'])
      .attr('opacity', 0.9).attr('stroke', '#fff').attr('stroke-width', 0.8);

    dots.append('text').attr('x', dotR + 3).attr('y', 0).attr('dy', '0.35em')
      .attr('fill', '#ccc').attr('font-size', '8px').attr('pointer-events', 'none')
      .text(d => {
        const n = d.name.replace(/, [A-Za-z]+$/, '').replace(/\b(city|town|village|CDP)\b/gi, '').trim();
        return n.length > 18 ? n.slice(0, 16) + '..' : n;
      });

    dots.on('mouseover', function(event, d) {
      d3.select(this).select('circle').attr('r', dotR + 3).attr('stroke-width', 2);
      d3.select(this).raise();
      tooltip.innerHTML = `<div class="tt-name">${esc(d.name)}</div><div class="tt-row">${d.ordinance_count || 0} ordinances</div>`;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).select('circle').attr('r', dotR).attr('stroke-width', 0.8);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) { scrollToJur(d.name); });
  }

  // Update hint
  const tracked = Object.keys(placeIdToJur).filter(g => matchedPlaceFips.has(g)).length;
  const hint = document.getElementById('map-hint');
  if (placesDrawn > 0) {
    hint.textContent = `${placesDrawn} Census places shown (${tracked} tracked in dataset). Click for details.`;
  } else {
    hint.textContent = `Place boundaries not available. ${dotData.length} jurisdictions shown as dots.`;
  }
}

function scrollToJur(name) {
  const items = document.querySelectorAll('.jur-item');
  for (const item of items) {
    if (item.querySelector('.jur-name')?.textContent?.includes(name.split(',')[0])) {
      item.classList.add('expanded');
      item.scrollIntoView({ behavior: 'smooth', block: 'center' });
      item.style.outline = '2px solid var(--accent)';
      setTimeout(() => item.style.outline = '', 2000);
      break;
    }
  }
}

function renderJurList() {
  const allJurs = DATA.jurisdictions?.[stateAbbrev] || [];
  const stateCounties = getStateCounties(US_TOPO, stFips);
  const countyJursMap = assignJursToCounties(allJurs, stateCounties);
  const jurs = countyJursMap[countyFips] || [];

  const sorted = [...jurs].sort((a, b) => {
    if (a.ordinance_count > 0 && b.ordinance_count === 0) return -1;
    if (b.ordinance_count > 0 && a.ordinance_count === 0) return 1;
    return a.name.localeCompare(b.name);
  });

  const list = document.getElementById('jur-list');
  if (sorted.length === 0) {
    list.innerHTML = '<div class="no-data-msg">No jurisdictions in this county.</div>';
    return;
  }

  list.innerHTML = sorted.map((j, idx) => {
    const sc = S_COLORS[j.status || '0_passes'];
    const statusLabel = S_LABELS[j.status || '0_passes'];
    const fips = [j.county_fips, j.place_fips].filter(Boolean).join(' / ');
    const ordBadge = j.ordinance_count > 0 ? `<span class="jur-badge" style="background:var(--accent);color:#fff">${j.ordinance_count} ord</span>` : '';

    const passes = Array.isArray(j.passes) ? j.passes : [];
    let detailHtml = '';

    if (passes.length > 0) {
      const tabColors = ['#6c8cff', '#f59e0b', '#10b981'];
      const uid = `cj-${idx}`;
      const passByNum = {};
      for (const p of passes) passByNum[p.pipeline_pass || 0] = p;
      const slots = [{ num: 1, label: 'Search 1', color: tabColors[0] }, { num: 2, label: 'Search 2', color: tabColors[1] }, { num: 3, label: 'Tiebreaker', color: tabColors[2] }];
      const firstAvail = slots.findIndex(s => passByNum[s.num]);

      const tabs = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})" style="opacity:0.35;cursor:default"><span class="pass-dot" style="background:#555"></span>${s.label}</div>`;
        const errored = isErrorNote(p.search_notes);
        const dotColor = errored ? '#f87171' : p.ordinances.length > 0 ? s.color : '#999';
        return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchTab('${uid}',${si})"><span class="pass-dot" style="background:${dotColor}"></span>${s.label}</div>`;
      }).join('');

      const panels = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) return `<div class="pass-panel${active}"><div class="pass-empty" style="color:#555">Not yet searched</div></div>`;
        if (isErrorNote(p.search_notes)) return `<div class="pass-panel${active}"><div class="pass-note" style="color:var(--red);background:rgba(248,113,113,0.08)">Search failed. This pass needs to be re-run.</div></div>`;
        const noteHtml = p.search_notes ? `<div class="pass-note">${esc(p.search_notes)}</div>` : '';
        if (p.ordinances.length === 0) return `<div class="pass-panel${active}">${noteHtml}<div class="pass-empty">No local tobacco ordinances found.</div></div>`;
        return `<div class="pass-panel${active}">${noteHtml}<div class="pass-summary-pill" style="background:${s.color}22;color:${s.color}">${p.ordinances.length} ordinance${p.ordinances.length !== 1 ? 's' : ''}</div>${p.ordinances.map(o => buildOrdCard(o)).join('')}</div>`;
      }).join('');

      detailHtml = `<div data-uid="${uid}"><div class="pass-tabs">${tabs}</div>${panels}</div>`;
    } else if (j.ordinances?.length > 0) {
      detailHtml = j.ordinances.map(o => buildOrdCard(o)).join('');
    } else {
      detailHtml = `<div style="font-size:0.75rem;color:var(--muted);padding:4px 0">${j.status === '0_passes' ? 'Not yet searched' : 'No local tobacco ordinances found.'}</div>`;
    }

    return `<div class="jur-item" onclick="this.classList.toggle('expanded')">
      <div class="jur-top">
        <div class="jur-name">${esc(j.name)}${ordBadge}</div>
        <div class="jur-status" style="background:${sc}22;color:${sc}">${statusLabel}</div>
      </div>
      ${fips ? `<div class="jur-meta">FIPS ${fips}</div>` : ''}
      <div class="jur-detail">${detailHtml}</div>
    </div>`;
  }).join('');
}

// Global function for tab switching
window.switchTab = function(uid, idx) {
  const container = document.querySelector(`[data-uid="${uid}"]`);
  if (!container) return;
  container.querySelectorAll('.pass-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  container.querySelectorAll('.pass-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
};
</script>


<div class="site-footer">
  Data from three-pass blind search pipeline &middot;

</div>
</body>
</html>

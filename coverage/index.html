<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coverage &mdash; Tobacco Control Laws</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

</head>
<body>
<nav class="site-nav">
  <a href="/" class="nav-brand">Tobacco Control Laws Dataset</a>
  <div class="nav-links">
    <a href="/" class="nav-link">About</a>
    <a href="/coverage/" class="nav-link active">Coverage</a>
    <a href="/policies/" class="nav-link">Policy Maps</a>
  </div>
</nav>


<div class="page-wide">
  <h1 style="font-size:1.35rem;font-weight:600;margin-bottom:4px">Coverage</h1>
  <p style="color:var(--muted);font-size:0.78rem;margin-bottom:16px">Three-pass blind search &mdash; jurisdiction-level coverage across the US</p>

  <div class="stats-row" id="kpi-row"></div>
  <div id="progress-breakdown" style="margin-bottom:14px"></div>

  <div class="map-section">
    <div class="filter-row" id="legend"></div>
    <div id="map-container" style="cursor:pointer"></div>
    <div class="map-hint" id="map-hint">Click a state to view its detail page</div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="two-col" style="margin-top:18px">
    <div class="card">
      <div class="card-title">Ordinances by Law Type (Top 10)</div>
      <div id="type-chart"></div>
    </div>
    <div class="card">
      <div class="card-title">States with Data</div>
      <div id="state-chart"></div>
    </div>
  </div>

  <div style="text-align:right;font-size:0.66rem;color:var(--muted);margin-top:14px" id="timestamp"></div>
</div>

<script type="module">
import { FIPS_TO_STATE, S_COLORS, S_LABELS, C_COLORS, C_LABELS, TYPE_COLORS, loadData, stateAggStatus } from '/js/shared.js';

const { data: DATA, us: US_TOPO } = await loadData();
document.getElementById('timestamp').textContent = `Data generated: ${new Date(DATA.generated_at).toLocaleString()}`;

// KPIs
const js = DATA.totals.jur_status;
const total = DATA.totals.total_jurisdictions_enumerated;
const pctDone = total > 0 ? ((js.done || 0) / total * 100) : 0;
const ordsFound = DATA.totals.total_ordinances_found;
const ordsTotal = DATA.totals.ords_total_in_passes || 0;
const ordsWithDate = DATA.totals.ords_with_date || 0;
const pctDated = ordsTotal > 0 ? (ordsWithDate / ordsTotal * 100) : 0;

document.getElementById('kpi-row').innerHTML = [
  { label:'Jurisdictions Complete', value: (js.done||0).toLocaleString(), sub:`${pctDone.toFixed(1)}% of ${total.toLocaleString()}`, color:'var(--green)', pct: pctDone, barColor:'var(--green)' },
  { label:'Ordinances Found', value: ordsFound.toLocaleString(), sub:`across searched jurisdictions`, color:'var(--blue)', pct: 100, barColor:'var(--blue)' },
  { label:'Have Dates', value: ordsWithDate.toLocaleString(), sub:`${pctDated.toFixed(0)}% of ${ordsTotal} ordinances`, color: pctDated >= 90 ? 'var(--green)' : 'var(--yellow)', pct: pctDated, barColor: pctDated >= 90 ? 'var(--green)' : 'var(--yellow)' },
  { label:'Missing Dates', value: (ordsTotal - ordsWithDate).toLocaleString(), sub: ordsTotal - ordsWithDate > 0 ? 'need date gap fill' : 'all dated', color: ordsTotal - ordsWithDate > 0 ? 'var(--red)' : 'var(--green)', pct: ordsTotal > 0 ? (ordsTotal-ordsWithDate)/ordsTotal*100 : 0, barColor:'var(--red)' },
].map(k => `<div class="stat">
  <div class="stat-lbl">${k.label}</div>
  <div class="stat-val" style="color:${k.color}">${k.value}</div>
  <div style="font-size:0.7rem;color:var(--muted);margin-top:1px">${k.sub}</div>
  <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.max(k.pct,0.5)}%;background:${k.barColor}"></div></div>
</div>`).join('');

// Progress bar
const statuses = [
  { key: 'done', label: 'Complete', color: S_COLORS.done },
  { key: 'needs_tiebreaker', label: 'Need 3rd Pass', color: S_COLORS.needs_tiebreaker },
  { key: '1_pass', label: 'Need 2nd Pass', color: S_COLORS['1_pass'] },
  { key: '0_passes', label: 'Not Started', color: '#3a4050' },
];
const segments = statuses.map(s => ({ ...s, n: js[s.key]||0, pct: total > 0 ? (js[s.key]||0)/total*100 : 0 }));
document.getElementById('progress-breakdown').innerHTML = `
  <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px">
    ${segments.map(s => s.pct > 0 ? `<div style="width:${s.pct}%;background:${s.color}" title="${s.label}: ${s.n}"></div>` : '').join('')}
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:0.72rem;color:var(--muted)">
    ${segments.map(s => `<span><span style="color:${s.color};font-weight:600">${s.n.toLocaleString()}</span> ${s.label} <span style="opacity:0.6">(${s.pct.toFixed(1)}%)</span></span>`).join('')}
  </div>`;

// Legend
const cOrder = ['all_done','some_done','some_started','not_started'];
document.getElementById('legend').innerHTML = cOrder.map(c =>
  `<div style="display:flex;align-items:center;gap:4px;font-size:0.73rem"><div style="width:11px;height:11px;border-radius:3px;background:${C_COLORS[c]}"></div>${C_LABELS[c]}</div>`
).join('');

// National map
const container = document.getElementById('map-container');
const width = container.clientWidth;
const height = width * 0.6;
const tooltip = document.getElementById('tooltip');

const svg = d3.select('#map-container').append('svg')
  .attr('viewBox', `0 0 ${width} ${height}`)
  .attr('preserveAspectRatio', 'xMidYMid meet');

const projection = d3.geoAlbersUsa().fitSize([width, height],
  topojson.feature(US_TOPO, US_TOPO.objects.states));
const path = d3.geoPath().projection(projection);
const states = topojson.feature(US_TOPO, US_TOPO.objects.states).features;

const fipsToAbbrev = {};
for (const [fips, abbrev] of Object.entries(FIPS_TO_STATE)) fipsToAbbrev[fips] = abbrev;

svg.selectAll('.state-shape')
  .data(states).join('path')
  .attr('d', path)
  .attr('fill', d => {
    const abbrev = fipsToAbbrev[d.id.toString().padStart(2,'0')];
    const s = DATA.states[abbrev];
    return s ? C_COLORS[stateAggStatus(s)] : C_COLORS['not_started'];
  })
  .attr('stroke', '#2a3040').attr('stroke-width', 0.8).attr('cursor', 'pointer')
  .on('mouseover', function(event, d) {
    d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5);
    const abbrev = fipsToAbbrev[d.id.toString().padStart(2,'0')];
    const s = DATA.states[abbrev];
    if (!s) return;
    const as = stateAggStatus(s);
    const cc = C_COLORS[as];
    const sjs = s.jur_status || {};
    const t = s.jurisdiction_count || 0;
    const dn = sjs.done || 0;
    tooltip.innerHTML = `
      <div class="tt-name">${s.name} (${abbrev})<span class="tt-badge" style="background:${cc}33;color:${cc}">${C_LABELS[as]}</span></div>
      <div class="tt-row">${t} jurisdictions &middot; ${dn} done (${t>0?Math.round(dn/t*100):0}%)</div>
      <div class="tt-row" style="font-size:0.63rem;margin-top:3px">Click to view state detail</div>`;
    tooltip.style.display = 'block';
  })
  .on('mousemove', function(event) {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
  })
  .on('mouseout', function() {
    d3.select(this).attr('stroke', '#2a3040').attr('stroke-width', 0.8);
    tooltip.style.display = 'none';
  })
  .on('click', function(event, d) {
    const abbrev = fipsToAbbrev[d.id.toString().padStart(2,'0')];
    if (abbrev) window.location.href = `/state/?st=${abbrev}`;
  });

// Charts
const typeEntries = Object.entries(DATA.totals.ordinances_by_type)
  .filter(([k]) => !k.startsWith('No ') && k !== 'unknown')
  .sort((a,b) => b[1] - a[1]).slice(0,10);
const maxType = typeEntries[0]?.[1] || 1;
document.getElementById('type-chart').innerHTML = typeEntries.map(([k,v],i) => {
  const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxType*100).toFixed(0)}%;background:${TYPE_COLORS[i%TYPE_COLORS.length]}"></div></div><div class="bar-val">${v}</div></div>`;
}).join('');

const statesWithData = Object.values(DATA.states)
  .filter(s => s.status !== '0_passes' || s.ordinances_found > 0)
  .sort((a,b) => {
    const pctA = a.jur_status ? (a.jur_status.done / Math.max(a.jurisdiction_count,1)) : 0;
    const pctB = b.jur_status ? (b.jur_status.done / Math.max(b.jurisdiction_count,1)) : 0;
    return pctB - pctA;
  });
const maxJur = Math.max(...statesWithData.map(s => s.jurisdiction_count), 1);
document.getElementById('state-chart').innerHTML = statesWithData.map(s => {
  const sjs = s.jur_status || {};
  const pctD = ((sjs.done||0) / (s.jurisdiction_count||1) * 100).toFixed(0);
  return `<div class="bar-row">
    <div class="bar-label"><a href="/state/?st=${s.abbrev}" style="color:var(--muted)">${s.abbrev} (${s.ordinances_found})</a></div>
    <div class="bar-track"><div class="bar-fill" style="width:${(s.jurisdiction_count/maxJur*100).toFixed(0)}%;background:${S_COLORS[s.status]}"></div></div>
    <div class="bar-val">${pctD}%</div>
  </div>`;
}).join('');
</script>


<div class="site-footer">
  Data from three-pass blind search pipeline &middot;
  <a href="https://github.com/tlcaputi/tobacco-ordinances">Source code</a>
</div>
</body>
</html>

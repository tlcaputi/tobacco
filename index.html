<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tobacco Control Laws — Pipeline Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e1e4ed;
    --muted: #8b8fa3; --accent: #6c8cff; --green: #34d399; --yellow: #fbbf24;
    --orange: #fb923c; --red: #f87171; --purple: #a78bfa; --blue: #60a5fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .layout { display: flex; height: 100vh; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .sidebar { width: 440px; border-left: 1px solid var(--border); background: var(--card); overflow-y: auto; padding: 20px; transition: width 0.2s; }
  .sidebar.hidden { width: 0; padding: 0; overflow: hidden; border: none; }

  h1 { font-size: 1.35rem; font-weight: 600; display: inline; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.78rem; margin-bottom: 16px; }

  /* Model tabs */
  .model-tabs { display: flex; gap: 2px; margin-bottom: 18px; background: var(--card); border-radius: 8px; padding: 3px; border: 1px solid var(--border); width: fit-content; }
  .model-tab { padding: 6px 16px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.15s; border: none; background: none; }
  .model-tab:hover:not(:disabled) { color: var(--text); }
  .model-tab:disabled { opacity: 0.35; cursor: not-allowed; }
  .model-tab.active { background: var(--accent); color: #fff; }
  .model-tab .tab-count { font-weight: 400; opacity: 0.7; margin-left: 4px; }

  /* KPIs — jurisdiction level */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .kpi-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-value { font-size: 1.7rem; font-weight: 700; margin-top: 2px; }
  .kpi-sub { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
  .kpi-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .kpi-bar-fill { height: 100%; border-radius: 2px; }

  /* Map */
  .map-section { position: relative; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 6px; font-size: 0.73rem; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 11px; height: 11px; border-radius: 3px; }

  #map-container svg { width: 100%; }
  .county-path { stroke: rgba(15,17,23,0.4); stroke-width: 0.3; cursor: pointer; transition: opacity 0.1s; }
  .county-path:hover { opacity: 0.75; stroke: #fff; stroke-width: 0.8; }
  .state-border { fill: none; stroke: var(--muted); stroke-width: 0.8; pointer-events: none; opacity: 0.4; }

  .tooltip {
    position: absolute; background: #1e2030; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; font-size: 0.78rem; pointer-events: none; z-index: 10; display: none; max-width: 320px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .tt-name { font-weight: 700; font-size: 0.88rem; }
  .tt-badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 0.63rem; font-weight: 600; margin-left: 5px; vertical-align: middle; }
  .tt-row { margin-top: 3px; color: var(--muted); font-size: 0.72rem; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .card-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 3px; }
  .bar-label { width: 145px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .bar-track { flex: 1; height: 17px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-val { width: 40px; font-size: 0.68rem; color: var(--muted); }

  /* Sidebar */
  .sb-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .sb-title { font-size: 1.1rem; font-weight: 700; }
  .sb-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 2px 8px; border-radius: 4px; line-height: 1; }
  .sb-close:hover { background: var(--border); color: var(--text); }
  .sb-badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.72rem; font-weight: 600; margin-bottom: 8px; }
  .sb-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .sb-stat { background: var(--bg); border-radius: 6px; padding: 8px 10px; }
  .sb-stat-label { font-size: 0.63rem; color: var(--muted); text-transform: uppercase; }
  .sb-stat-value { font-size: 1rem; font-weight: 700; }
  .sb-passes { font-size: 0.73rem; color: var(--muted); margin-bottom: 12px; }
  .sb-passes .done { color: var(--green); font-weight: 600; }
  .sb-search { width: 100%; padding: 7px 11px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.78rem; margin-bottom: 6px; }
  .sb-search:focus { outline: none; border-color: var(--accent); }
  .sb-showing { font-size: 0.68rem; color: var(--muted); margin-bottom: 6px; }
  .jur-list { max-height: calc(100vh - 340px); overflow-y: auto; }
  .jur-item { border: 1px solid var(--border); border-radius: 6px; padding: 9px 11px; margin-bottom: 4px; cursor: pointer; transition: border-color 0.15s; }
  .jur-item:hover { border-color: var(--accent); }
  .jur-item.expanded { border-color: var(--accent); background: rgba(108,140,255,0.03); }
  .jur-name { font-weight: 600; font-size: 0.8rem; }
  .jur-badge { display: inline-block; font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 5px; }
  .jur-status { font-size: 0.63rem; margin-left: 5px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .jur-fips { font-size: 0.63rem; color: var(--muted); }
  .jur-ords { margin-top: 7px; display: none; }
  .jur-item.expanded .jur-ords { display: block; }
  .ord-card { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; margin-bottom: 4px; font-size: 0.73rem; }
  .ord-type { font-weight: 600; color: var(--accent); }
  .ord-meta { color: var(--muted); margin-top: 2px; }
  .ord-meta a { color: var(--blue); text-decoration: none; }
  .ord-meta a:hover { text-decoration: underline; }
  .ord-conf { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: 600; margin-left: 4px; }
  .ord-desc { color: var(--text); margin-top: 2px; opacity: 0.85; }
  /* Per-pass detail view */
  .pass-tabs { display: flex; gap: 0; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
  .pass-tab { padding: 5px 12px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 5px 5px 0 0; color: var(--muted); background: none; transition: all 0.12s; }
  .pass-tab:hover { color: var(--text); background: rgba(108,140,255,0.04); }
  .pass-tab.active { color: var(--accent); border-color: var(--border); background: var(--card); margin-bottom: -1px; }
  .pass-tab .pass-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .pass-panel { display: none; }
  .pass-panel.active { display: block; }
  .pass-note { font-size: 0.68rem; color: var(--muted); font-style: italic; margin-bottom: 6px; padding: 4px 8px; background: rgba(108,140,255,0.04); border-radius: 4px; }
  .pass-empty { font-size: 0.72rem; color: var(--muted); padding: 6px 0; }
  .pass-summary { display: flex; gap: 12px; margin-bottom: 8px; }
  .pass-summary-pill { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .no-data { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 0.82rem; }
  .timestamp { text-align: right; font-size: 0.66rem; color: var(--muted); margin-top: 14px; padding-bottom: 14px; }
</style>
</head>
<body>
<div class="layout">
<div class="main">
  <div class="header-row">
    <h1>Tobacco Control Laws Dataset</h1>
  </div>
  <p class="subtitle">Jurisdiction-level pipeline progress &mdash; three-pass blind search</p>

  <div class="model-tabs" id="model-tabs">
    <button class="model-tab active" data-model="claude-code">Claude Code</button>
    <button class="model-tab" data-model="qwen2.5:7b">qwen2.5:7b</button>
  </div>

  <div id="main-view">
    <div class="kpi-row" id="kpi-row"></div>
    <div id="progress-breakdown" style="margin-bottom:14px"></div>

    <div class="map-section">
      <div class="legend" id="legend"></div>
      <div id="map-container" style="cursor:pointer"></div>
      <div id="map-hint" style="font-size:0.63rem;color:var(--muted);text-align:center;margin-top:2px">Click a state to see its jurisdictions</div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="charts-row">
      <div class="card">
        <div class="card-title">Ordinances by Law Type (Top 10)</div>
        <div id="type-chart"></div>
      </div>
      <div class="card">
        <div class="card-title">Jurisdictions by State (with data)</div>
        <div id="state-chart"></div>
      </div>
    </div>
  </div>

  <div class="timestamp" id="timestamp"></div>
</div>

<div class="sidebar hidden" id="sidebar">
  <div class="sb-header">
    <div class="sb-title" id="sb-title"></div>
    <button class="sb-close" id="sb-close">&times;</button>
  </div>
  <div id="sb-badge-area"></div>
  <div class="sb-stats" id="sb-stats"></div>
  <div class="sb-passes" id="sb-passes"></div>
  <input type="text" class="sb-search" id="sb-search" placeholder="Filter jurisdictions...">
  <div class="sb-showing" id="sb-showing"></div>
  <div class="jur-list" id="jur-list"></div>
</div>
</div>

<script>
const S_COLORS = { done:'#34d399', needs_tiebreaker:'#a78bfa', '1_pass':'#60a5fa', '0_passes':'#1e2030' };
const S_LABELS = { done:'Complete', needs_tiebreaker:'Needs 3rd Pass', '1_pass':'Needs 2nd Pass', '0_passes':'Not Started' };
// County-level aggregate status colors
const C_COLORS = { all_done:'#34d399', some_done:'#2a8a6a', some_started:'#3b5998', not_started:'#1a1f2e' };
const C_LABELS = { all_done:'All Complete', some_done:'Some Complete', some_started:'Some Started', not_started:'Not Started' };
const CONF_COLORS = {
  both_passes:'#34d399', majority_confirmed:'#6c8cff', tiebreaker_confirmed:'#a78bfa',
  pass1_only:'#fbbf24', pass2_only:'#fb923c', tiebreaker_uncertain:'#f87171', tiebreaker_rejected:'#ef4444'
};
const TYPE_COLORS = ['#6c8cff','#34d399','#fbbf24','#a78bfa','#fb923c','#f87171','#60a5fa','#f472b6','#22d3ee','#84cc16'];

const FIPS_TO_STATE = {
  "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT","10":"DE",
  "11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL","18":"IN","19":"IA",
  "20":"KS","21":"KY","22":"LA","23":"ME","24":"MD","25":"MA","26":"MI","27":"MN",
  "28":"MS","29":"MO","30":"MT","31":"NE","32":"NV","33":"NH","34":"NJ","35":"NM",
  "36":"NY","37":"NC","38":"ND","39":"OH","40":"OK","41":"OR","42":"PA","44":"RI",
  "45":"SC","46":"SD","47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA",
  "54":"WV","55":"WI","56":"WY"
};

let DATA = null;
let US_TOPO = null;
let countyFipsToStatus = {};  // county FIPS -> best status
let countyFipsToState = {};   // county FIPS -> state abbrev
let currentModel = 'claude-code';

// Model-aware data: returns jurisdiction/state data filtered for the active model.
// For claude-code: use real DATA as-is.
// For other models: return the same structure but with all statuses zeroed (no data yet).
function getModelJurisdictions(abbrev) {
  const jurs = DATA.jurisdictions?.[abbrev] || [];
  if (currentModel === 'claude-code') return jurs;
  // Other models have no data yet — return jurisdictions with 0_passes status
  return jurs.map(j => ({ ...j, status: '0_passes', ordinance_count: 0, passes: [] }));
}
function getModelJurStatus() {
  if (currentModel === 'claude-code') return DATA.totals.jur_status;
  const total = DATA.totals.total_jurisdictions_enumerated || 0;
  return { done: 0, needs_tiebreaker: 0, '1_pass': 0, '0_passes': total };
}
function getModelStateJurStatus(abbrev) {
  const s = DATA.states[abbrev];
  if (!s) return { done: 0, needs_tiebreaker: 0, '1_pass': 0, '0_passes': 0 };
  if (currentModel === 'claude-code') return s.jur_status || {};
  return { done: 0, needs_tiebreaker: 0, '1_pass': 0, '0_passes': s.jurisdiction_count || 0 };
}

Promise.all([
  fetch('dashboard_data.json').then(r => r.json()),
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(r => r.json())
]).then(([data, us]) => {
  DATA = data;
  US_TOPO = us;
  buildCountyIndex();
  render();
  document.getElementById('timestamp').textContent = `Data generated: ${new Date(data.generated_at).toLocaleString()}`;
});

function buildCountyIndex() {
  // Map county FIPS to the best jurisdiction status within that county
  // and to state abbreviation
  countyFipsToStatus = {};
  countyFipsToState = {};

  for (const [abbrev, jurs] of Object.entries(DATA.jurisdictions || {})) {
    for (const j of jurs) {
      const cf = j.county_fips;
      if (!cf) continue;
      countyFipsToState[cf] = abbrev;
      const cur = countyFipsToStatus[cf];
      const rank = statusRank(j.status);
      if (!cur || rank > statusRank(cur)) {
        countyFipsToStatus[cf] = j.status;
      }
    }
  }

  // Also fill in from state-level for states with no jurisdiction detail
  // (counties that haven't been searched yet)
  for (const [abbrev, s] of Object.entries(DATA.states)) {
    const stFips = Object.entries(FIPS_TO_STATE).find(([k,v]) => v === abbrev)?.[0];
    if (stFips) {
      // We'll mark unknown counties for this state in the map render
    }
  }
}

function statusRank(s) {
  return { done: 3, needs_tiebreaker: 2, '1_pass': 1, '0_passes': 0 }[s] || 0;
}

// Ollama comparison data (from comparison_report.md — raw files purged)
const OLLAMA_DATA = {
  fl: {
    label: 'FL — Claude pass 1 vs qwen2.5:7b pass 2',
    jurisdictions: 769, agreement: 60.5, recall: 12.4, precision: 8.3, f1: 10.0,
    ollama_completeness: 84.5, claude_completeness: 69.2,
    tp: 21, fp: 231, fn: 149,
    by_type: [
      { type:'flavored_tobacco_ban', recall:50.0, precision:6.2, tp:1, fp:15, fn:1 },
      { type:'retailer_density_proximity', recall:0, precision:null, tp:0, fp:0, fn:1 },
      { type:'smokefree_indoor', recall:0, precision:0, tp:0, fp:83, fn:11 },
      { type:'smokefree_multiunit_housing', recall:0, precision:null, tp:0, fp:0, fn:4 },
      { type:'smokefree_outdoor', recall:14.0, precision:18.5, tp:17, fp:75, fn:104 },
      { type:'tobacco_retail_sales', recall:9.7, precision:4.9, tp:3, fp:58, fn:28 },
    ]
  },
  ma: {
    label: 'MA — Claude pass 1 vs qwen2.5:7b pass 2',
    jurisdictions: 103, agreement: 39.8, recall: 22.6, precision: 19.2, f1: 20.7,
    ollama_completeness: 69.2, claude_completeness: 69.2,
    tp: 14, fp: 59, fn: 48,
    by_type: [
      { type:'flavored_tobacco_ban', recall:0, precision:0, tp:0, fp:6, fn:2 },
      { type:'retailer_density_proximity', recall:0, precision:0, tp:0, fp:1, fn:2 },
      { type:'smokefree_indoor', recall:31.2, precision:25.0, tp:5, fp:15, fn:11 },
      { type:'smokefree_multiunit_housing', recall:0, precision:null, tp:0, fp:0, fn:3 },
      { type:'smokefree_outdoor', recall:12.5, precision:11.1, tp:1, fp:8, fn:7 },
      { type:'tobacco_retail_sales', recall:25.8, precision:21.6, tp:8, fp:29, fn:23 },
    ]
  }
};

function renderAll() {
  renderKPIs();
  renderLegend('national');
  renderMap();
  renderCharts();
}

function render() {
  renderAll();
  setupTabs();
}

function setupTabs() {
  document.querySelectorAll('.model-tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.model-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentModel = btn.dataset.model;
      // Reset to national view and re-render everything for this model
      mapMode = 'national';
      mapStateAbbrev = null;
      mapCountyFips = null;
      document.getElementById('sidebar').classList.add('hidden');
      renderAll();
    };
  });
}

function renderKPIs() {
  const js = getModelJurStatus();
  const total = DATA.totals.total_jurisdictions_enumerated;
  const pctDone = total > 0 ? ((js.done || 0) / total * 100) : 0;

  const isClaude = currentModel === 'claude-code';
  const ordsTotal = isClaude ? (DATA.totals.ords_total_in_passes || 0) : 0;
  const ordsWithDate = isClaude ? (DATA.totals.ords_with_date || 0) : 0;
  const ordsFound = isClaude ? DATA.totals.total_ordinances_found : 0;
  const pctDated = ordsTotal > 0 ? (ordsWithDate / ordsTotal * 100) : 0;

  const kpis = [
    { label:'Jurisdictions Complete', value: (js.done||0).toLocaleString(), sub:`${pctDone.toFixed(1)}% of ${total.toLocaleString()}`, color:'var(--green)', pct: pctDone, barColor:'var(--green)' },
    { label:'Ordinances Found', value: ordsFound.toLocaleString(), sub: isClaude ? `across ${(js.done||0) + (js.needs_tiebreaker||0) + (js['1_pass']||0)} jurisdictions with data` : 'no searches yet', color:'var(--blue)', pct: isClaude ? 100 : 0, barColor:'var(--blue)' },
    { label:'Have Dates', value: ordsWithDate.toLocaleString(), sub:`${pctDated.toFixed(0)}% of ${ordsTotal.toLocaleString()} ordinances`, color: pctDated >= 90 ? 'var(--green)' : pctDated >= 70 ? 'var(--yellow)' : 'var(--red)', pct: pctDated, barColor: pctDated >= 90 ? 'var(--green)' : pctDated >= 70 ? 'var(--yellow)' : 'var(--red)' },
    { label:'Missing Dates', value: (ordsTotal - ordsWithDate).toLocaleString(), sub: ordsTotal - ordsWithDate > 0 ? 'need date gap fill' : (isClaude ? 'all dated' : 'n/a'), color: ordsTotal - ordsWithDate > 0 ? 'var(--red)' : 'var(--green)', pct: ordsTotal > 0 ? (ordsTotal - ordsWithDate)/ordsTotal*100 : 0, barColor:'var(--red)' },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k =>
    `<div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color}">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.max(k.pct, 0.5)}%;background:${k.barColor}"></div></div>
    </div>`
  ).join('');

  // Progress breakdown bar
  const statuses = [
    { key: 'done', label: 'Complete', color: S_COLORS.done },
    { key: 'needs_tiebreaker', label: 'Need 3rd Pass', color: S_COLORS.needs_tiebreaker },
    { key: '1_pass', label: 'Need 2nd Pass', color: S_COLORS['1_pass'] },
    { key: '0_passes', label: 'Not Started', color: '#3a4050' },
  ];
  const segments = statuses.map(s => {
    const n = js[s.key] || 0;
    const pctN = total > 0 ? n / total * 100 : 0;
    return { ...s, n, pctN };
  });
  document.getElementById('progress-breakdown').innerHTML = `
    <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px">
      ${segments.map(s => s.pctN > 0 ? `<div style="width:${s.pctN}%;background:${s.color}" title="${s.label}: ${s.n}"></div>` : '').join('')}
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:0.72rem;color:var(--muted)">
      ${segments.map(s => `<span><span style="color:${s.color};font-weight:600">${s.n.toLocaleString()}</span> ${s.label} <span style="opacity:0.6">(${s.pctN.toFixed(1)}%)</span></span>`).join('')}
    </div>`;
}

function renderLegend(mode) {
  if (mode === 'state') {
    const cOrder = ['all_done','some_done','some_started','not_started'];
    document.getElementById('legend').innerHTML =
      cOrder.map(c =>
        `<div class="legend-item"><div class="legend-dot" style="background:${C_COLORS[c]}"></div>${C_LABELS[c]}</div>`
      ).join('');
  } else if (mode === 'county') {
    const order = ['done','needs_tiebreaker','1_pass','0_passes'];
    document.getElementById('legend').innerHTML = order.map(s =>
      `<div class="legend-item"><div class="legend-dot" style="background:${S_COLORS[s]};border-radius:50%"></div>${S_LABELS[s]}</div>`
    ).join('');
  } else {
    const cOrder = ['all_done','some_done','some_started','not_started'];
    document.getElementById('legend').innerHTML = cOrder.map(c =>
      `<div class="legend-item"><div class="legend-dot" style="background:${C_COLORS[c]}"></div>${C_LABELS[c]}</div>`
    ).join('');
  }
}

let mapMode = 'national'; // 'national', 'state', or 'county'
let mapStateAbbrev = null;

function renderMap() {
  if (mapMode === 'county' && mapStateAbbrev && mapCountyFips) {
    renderCountyMap(mapStateAbbrev, mapCountyFips);
  } else if (mapMode === 'state' && mapStateAbbrev) {
    renderStateMap(mapStateAbbrev);
  } else {
    renderNationalMap();
  }
}

function renderNationalMap() {
  mapMode = 'national';
  mapStateAbbrev = null;
  renderLegend('national');
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  const width = container.clientWidth;
  const height = width * 0.6;
  const tooltip = document.getElementById('tooltip');
  document.getElementById('map-hint').textContent = 'Click a state to see its jurisdictions';

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  const projection = d3.geoAlbersUsa().fitSize([width, height],
    topojson.feature(US_TOPO, US_TOPO.objects.states));
  const path = d3.geoPath().projection(projection);
  const states = topojson.feature(US_TOPO, US_TOPO.objects.states).features;

  // Compute per-state aggregate status from jurisdiction-level breakdown
  function stateAggStatus(s) {
    const js = getModelStateJurStatus(s.abbrev);
    const total = s.jurisdiction_count || 0;
    if (total === 0) return 'not_started';
    const done = js.done || 0;
    const started = done + (js.needs_tiebreaker || 0) + (js['1_pass'] || 0);
    if (done === total) return 'all_done';
    if (done > 0) return 'some_done';
    if (started > 0) return 'some_started';
    return 'not_started';
  }

  // Map state FIPS -> abbrev
  const fipsToAbbrev = {};
  for (const [fips, abbrev] of Object.entries(FIPS_TO_STATE)) {
    fipsToAbbrev[fips] = abbrev;
  }

  svg.selectAll('.state-shape')
    .data(states)
    .join('path')
    .attr('class', 'state-shape')
    .attr('d', path)
    .attr('fill', d => {
      const fips = d.id.toString().padStart(2, '0');
      const abbrev = fipsToAbbrev[fips];
      const s = DATA.states[abbrev];
      return s ? C_COLORS[stateAggStatus(s)] : C_COLORS['not_started'];
    })
    .attr('stroke', '#2a3040')
    .attr('stroke-width', 0.8)
    .attr('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke', '#fff').attr('stroke-width', 1.5);
      const fips = d.id.toString().padStart(2, '0');
      const abbrev = fipsToAbbrev[fips];
      const s = DATA.states[abbrev];
      if (!s) return;
      const as = stateAggStatus(s);
      const cc = C_COLORS[as];
      const js = getModelStateJurStatus(s.abbrev);
      const total = s.jurisdiction_count || 0;
      const done = js.done || 0;
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      tooltip.innerHTML = `
        <div class="tt-name">${s.name} (${abbrev})
          <span class="tt-badge" style="background:${cc}33;color:${cc}">${C_LABELS[as]}</span>
        </div>
        <div class="tt-row">${total} jurisdictions &middot; ${done} done (${pct}%)</div>
        ${js.needs_tiebreaker ? `<div class="tt-row" style="color:var(--purple)">${js.needs_tiebreaker} need tiebreaker</div>` : ''}
        ${js['1_pass'] ? `<div class="tt-row" style="color:var(--blue)">${js['1_pass']} have 1 pass</div>` : ''}
        <div class="tt-row" style="font-size:0.63rem;margin-top:3px">Click to see counties</div>
      `;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', '#2a3040').attr('stroke-width', 0.8);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      const fips = d.id.toString().padStart(2, '0');
      const abbrev = fipsToAbbrev[fips];
      if (abbrev) {
        renderStateMap(abbrev);
        openSidebar(abbrev);
      }
    });
}

// Shared helpers for state & county map levels
function getStateCounties(stFips) {
  const allCounties = topojson.feature(US_TOPO, US_TOPO.objects.counties).features;
  return allCounties.filter(d => d.id.toString().padStart(5,'0').startsWith(stFips));
}
function getStateFips(abbrev) {
  return Object.entries(FIPS_TO_STATE).find(([k,v]) => v === abbrev)?.[0];
}
function assignJursToCounties(jurs, stateCounties) {
  const countyJurs = {};
  for (const cty of stateCounties) {
    const cfips = cty.id.toString().padStart(5, '0');
    countyJurs[cfips] = [];
  }
  for (const j of jurs) {
    let assigned = false;
    const cf = j.county_fips;
    if (cf && countyJurs[cf] !== undefined) {
      countyJurs[cf].push(j);
      assigned = true;
    }
    if (!assigned && j.lat && j.lon) {
      for (const cty of stateCounties) {
        if (d3.geoContains(cty, [j.lon, j.lat])) {
          const cfips = cty.id.toString().padStart(5, '0');
          countyJurs[cfips].push(j);
          break;
        }
      }
    }
  }
  return countyJurs;
}
function buildCountyNames(jurs) {
  const names = {};
  for (const j of jurs) {
    if (j.county_fips && j.name && j.name.includes('County')) {
      names[j.county_fips] = j.name.replace(/, [A-Za-z]+$/, '');
    }
  }
  return names;
}
function computeCountyStatus(statuses) {
  if (statuses.length === 0) return 'not_started';
  const hasDone = statuses.some(s => s === 'done');
  const allDone = statuses.every(s => s === 'done');
  const hasStarted = statuses.some(s => s === 'done' || s === 'needs_tiebreaker' || s === '1_pass');
  if (allDone) return 'all_done';
  if (hasDone) return 'some_done';
  if (hasStarted) return 'some_started';
  return 'not_started';
}

let mapCountyFips = null;
let currentCountyJurNames = null; // Set of jurisdiction names assigned to the current county (via geoContains)

function renderStateMap(abbrev) {
  mapMode = 'state';
  mapStateAbbrev = abbrev;
  mapCountyFips = null;
  renderLegend('state');
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  const width = container.clientWidth;
  const height = width * 0.7;
  const tooltip = document.getElementById('tooltip');
  const s = DATA.states[abbrev];
  document.getElementById('map-hint').innerHTML = `<a href="#" onclick="renderNationalMap();return false" style="color:var(--accent);text-decoration:none">&larr; Back to US</a> &middot; ${s ? s.name : abbrev} — click a county to see jurisdictions`;

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  const g = svg.append('g');

  const stFips = getStateFips(abbrev);
  if (!stFips) return;
  const stateCounties = getStateCounties(stFips);
  if (stateCounties.length === 0) return;

  const stateFC = { type: 'FeatureCollection', features: stateCounties };
  const projection = d3.geoAlbersUsa().fitSize([width - 20, height - 20], stateFC);
  if (!projection) return;
  const path = d3.geoPath().projection(projection);

  const jurs = getModelJurisdictions(abbrev);
  const countyJurs = assignJursToCounties(jurs, stateCounties);
  const countyNames = buildCountyNames(jurs);

  // Draw county boundaries colored by aggregate status
  g.selectAll('.county-path')
    .data(stateCounties)
    .join('path')
    .attr('class', 'county-path')
    .attr('d', path)
    .attr('fill', d => {
      const cfips = d.id.toString().padStart(5, '0');
      const statuses = (countyJurs[cfips] || []).map(j => j.status || '0_passes');
      return C_COLORS[computeCountyStatus(statuses)];
    })
    .attr('stroke', '#3a4050')
    .attr('stroke-width', 0.5)
    .attr('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      d3.select(this).attr('stroke', '#aaa').attr('stroke-width', 1.5);
      const cfips = d.id.toString().padStart(5, '0');
      const cjurs = countyJurs[cfips] || [];
      const statuses = cjurs.map(j => j.status || '0_passes');
      const cs = computeCountyStatus(statuses);
      const doneCount = statuses.filter(s => s === 'done').length;
      const cc = C_COLORS[cs];
      const cname = countyNames[cfips] || `County ${cfips}`;
      tooltip.innerHTML = `
        <div class="tt-name">${cname}
          <span class="tt-badge" style="background:${cc}33;color:${cc}">${C_LABELS[cs]}</span>
        </div>
        <div class="tt-row">${cjurs.length} jurisdiction${cjurs.length!==1?'s':''} &middot; ${doneCount} complete</div>
        <div class="tt-row" style="font-size:0.63rem;margin-top:3px">Click to see jurisdictions</div>
      `;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).attr('stroke', '#3a4050').attr('stroke-width', 0.5);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      const cfips = d.id.toString().padStart(5, '0');
      renderCountyMap(abbrev, cfips);  // This sets currentCountyJurNames
      openSidebar(abbrev, cfips);
    });

  // Draw state outline
  const allStates = topojson.feature(US_TOPO, US_TOPO.objects.states).features;
  const stateFeature = allStates.find(d => d.id.toString().padStart(2,'0') === stFips);
  if (stateFeature) {
    g.append('path').datum(stateFeature).attr('d', path)
      .attr('fill', 'none').attr('stroke', '#667').attr('stroke-width', 1.2);
  }

  // County labels for larger counties
  g.selectAll('.county-label')
    .data(stateCounties)
    .join('text')
    .attr('class', 'county-label')
    .attr('x', d => path.centroid(d)[0])
    .attr('y', d => path.centroid(d)[1])
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('fill', '#ffffffaa')
    .attr('font-size', '7px')
    .attr('pointer-events', 'none')
    .text(d => {
      const cfips = d.id.toString().padStart(5, '0');
      const n = countyNames[cfips];
      if (!n) return '';
      // Only label if county polygon is big enough
      const bounds = path.bounds(d);
      const w = bounds[1][0] - bounds[0][0];
      if (w < 40) return '';
      return n.replace(' County', '').replace(/, .*/, '');
    });
}

function renderCountyMap(abbrev, countyFips) {
  mapMode = 'county';
  mapStateAbbrev = abbrev;
  mapCountyFips = countyFips;
  renderLegend('county');
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  const width = container.clientWidth;
  const height = width * 0.7;
  const tooltip = document.getElementById('tooltip');
  const s = DATA.states[abbrev];

  const stFips = getStateFips(abbrev);
  if (!stFips) return;
  const stateCounties = getStateCounties(stFips);
  const jurs = getModelJurisdictions(abbrev);
  const countyJurs = assignJursToCounties(jurs, stateCounties);
  const countyNames = buildCountyNames(jurs);
  const cname = countyNames[countyFips] || `County ${countyFips}`;

  // Store which jurisdictions belong to this county (for sidebar filtering)
  currentCountyJurNames = new Set((countyJurs[countyFips] || []).map(j => j.name));

  document.getElementById('map-hint').innerHTML =
    `<a href="#" onclick="renderNationalMap();return false" style="color:var(--accent);text-decoration:none">&larr; US</a>` +
    ` &middot; <a href="#" onclick="renderStateMap('${abbrev}');return false" style="color:var(--accent);text-decoration:none">${s ? s.name : abbrev}</a>` +
    ` &middot; ${cname}`;

  const svg = d3.select('#map-container').append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  const g = svg.append('g');

  // Find the county feature
  const countyFeature = stateCounties.find(d => d.id.toString().padStart(5,'0') === countyFips);
  if (!countyFeature) return;

  // Also show neighboring counties as context
  const projection = d3.geoAlbersUsa().fitSize([width * 0.8, height * 0.8], countyFeature);
  if (!projection) return;
  const path = d3.geoPath().projection(projection);

  // Draw neighboring counties dimmed
  g.selectAll('.neighbor-county')
    .data(stateCounties)
    .join('path')
    .attr('class', 'neighbor-county')
    .attr('d', path)
    .attr('fill', d => d.id.toString().padStart(5,'0') === countyFips ? '#1e2a3a' : '#12151e')
    .attr('stroke', '#2a3040')
    .attr('stroke-width', 0.5);

  // Highlight the selected county
  g.append('path').datum(countyFeature).attr('d', path)
    .attr('fill', 'none').attr('stroke', '#667').attr('stroke-width', 2);

  // Get jurisdictions in this county
  const ctyJurs = countyJurs[countyFips] || [];

  // Project jurisdiction dots
  const jurDots = [];
  for (const j of ctyJurs) {
    if (j.lat && j.lon) {
      const pt = projection([j.lon, j.lat]);
      if (pt) jurDots.push({ ...j, x: pt[0], y: pt[1] });
    } else {
      // Place jurisdictions without coords at the county centroid with some jitter
      const c = path.centroid(countyFeature);
      if (c && !isNaN(c[0])) {
        jurDots.push({ ...j, x: c[0], y: c[1] });
      }
    }
  }

  // Force simulation to prevent overlaps
  const DOT_R = jurDots.length > 30 ? 5 : jurDots.length > 15 ? 6 : 8;
  const sim = d3.forceSimulation(jurDots)
    .force('x', d3.forceX(d => d.x).strength(0.8))
    .force('y', d3.forceY(d => d.y).strength(0.8))
    .force('collide', d3.forceCollide(DOT_R + 2))
    .stop();
  for (let i = 0; i < 120; i++) sim.tick();

  // Draw jurisdiction dots
  const dots = g.selectAll('.jur-dot')
    .data(jurDots)
    .join('g')
    .attr('class', 'jur-dot')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .attr('cursor', 'pointer');

  dots.append('circle')
    .attr('r', DOT_R)
    .attr('fill', d => S_COLORS[d.status || '0_passes'])
    .attr('opacity', d => d.status === '0_passes' ? 0.35 : 0.9)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1);

  // Labels next to dots — show always if few, show on hover if many
  const showLabels = jurDots.length <= 20;
  dots.append('text')
    .attr('class', 'jur-label')
    .attr('x', DOT_R + 4)
    .attr('y', 0)
    .attr('dy', '0.35em')
    .attr('fill', '#ccc')
    .attr('font-size', '9px')
    .attr('pointer-events', 'none')
    .attr('opacity', showLabels ? 1 : 0)
    .text(d => {
      let n = d.name || '';
      n = n.replace(/, [A-Za-z]+$/, '').replace(/\b(city|town|village|CDP)\b/gi, '').trim();
      return n.length > 25 ? n.slice(0, 23) + '...' : n;
    });

  // Hover & click
  dots.on('mouseover', function(event, d) {
      d3.select(this).select('circle').attr('stroke-width', 2.5).attr('stroke', '#fff');
      if (!showLabels) d3.select(this).select('.jur-label').attr('opacity', 1);
      d3.select(this).raise();
      const sc = S_COLORS[d.status || '0_passes'];
      tooltip.innerHTML = `
        <div class="tt-name">${d.name}
          <span class="tt-badge" style="background:${sc}33;color:${sc}">${S_LABELS[d.status || '0_passes']}</span>
        </div>
        ${d.ordinance_count > 0 ? `<div class="tt-row">${d.ordinance_count} ordinance${d.ordinance_count !== 1 ? 's' : ''}</div>` : `<div class="tt-row">${d.status === '0_passes' ? 'Not yet searched' : 'No ordinances found'}</div>`}
        ${d.passes && d.passes.length > 0 ? `<div class="tt-row">${d.passes.length} search${d.passes.length!==1?'es':''} completed</div>` : ''}
        <div class="tt-row" style="font-size:0.63rem;margin-top:3px">Click to view details</div>
      `;
      tooltip.style.display = 'block';
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    })
    .on('mouseout', function() {
      d3.select(this).select('circle').attr('stroke-width', 1).attr('stroke', '#fff');
      if (!showLabels) d3.select(this).select('.jur-label').attr('opacity', 0);
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      openSidebar(abbrev, countyFips);
      setTimeout(() => {
        const searchEl = document.getElementById('sb-search');
        searchEl.value = d.name.split(',')[0];
        searchEl.dispatchEvent(new Event('input'));
      }, 100);
    });
}

function renderCharts() {
  if (currentModel !== 'claude-code') {
    document.getElementById('type-chart').innerHTML = '<div style="color:var(--muted);font-size:0.75rem;padding:20px 0">No search data yet for this model</div>';
    document.getElementById('state-chart').innerHTML = '<div style="color:var(--muted);font-size:0.75rem;padding:20px 0">No search data yet for this model</div>';
    return;
  }
  const t = DATA.totals;
  const typeEntries = Object.entries(t.ordinances_by_type)
    .filter(([k]) => !k.startsWith('No ') && k !== 'unknown')
    .sort((a,b) => b[1] - a[1]).slice(0,10);
  const maxType = typeEntries[0]?.[1] || 1;
  document.getElementById('type-chart').innerHTML = typeEntries.map(([k,v],i) => {
    const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    return `<div class="bar-row"><div class="bar-label" title="${label}">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxType*100).toFixed(0)}%;background:${TYPE_COLORS[i%TYPE_COLORS.length]}"></div></div><div class="bar-val">${v}</div></div>`;
  }).join('');

  // State progress chart — states with any data, sorted by % done
  const statesWithData = Object.values(DATA.states)
    .filter(s => s.status !== '0_passes' || s.ordinances_found > 0)
    .sort((a,b) => {
      const pctA = a.jur_status ? (a.jur_status.done / Math.max(a.jurisdiction_count, 1)) : 0;
      const pctB = b.jur_status ? (b.jur_status.done / Math.max(b.jurisdiction_count, 1)) : 0;
      return pctB - pctA;
    });
  const maxJur = Math.max(...statesWithData.map(s => s.jurisdiction_count), 1);
  document.getElementById('state-chart').innerHTML = statesWithData.map(s => {
    const js = s.jur_status || {};
    const total = s.jurisdiction_count || 1;
    const pctDone = ((js.done || 0) / total * 100).toFixed(0);
    const sc = S_COLORS[s.status];
    return `<div class="bar-row">
      <div class="bar-label">${s.abbrev} (${s.ordinances_found})</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(s.jurisdiction_count/maxJur*100).toFixed(0)}%;background:${sc}"></div>
      </div>
      <div class="bar-val">${pctDone}%</div>
    </div>`;
  }).join('');
}

// ---- Sidebar ----
let sidebarCountyFips = null; // Track if sidebar is showing county-level context

function openSidebar(abbrev, countyFips) {
  const sb = document.getElementById('sidebar');
  const s = DATA.states[abbrev];
  if (!s) return;
  sb.classList.remove('hidden');
  sidebarCountyFips = countyFips || null;

  const allJurs = getModelJurisdictions(abbrev);

  if (countyFips) {
    // County-level sidebar — use geo-assigned names if available
    const ctyJurs = (currentCountyJurNames && currentCountyJurNames.size > 0)
      ? allJurs.filter(j => currentCountyJurNames.has(j.name))
      : allJurs.filter(j => j.county_fips === countyFips);
    const countyNames = buildCountyNames(allJurs);
    const cname = countyNames[countyFips] || `County ${countyFips}`;

    const statuses = ctyJurs.map(j => j.status || '0_passes');
    const aggStatus = computeCountyStatus(statuses);
    const c = C_COLORS[aggStatus];
    document.getElementById('sb-title').textContent = cname;
    document.getElementById('sb-badge-area').innerHTML =
      `<span class="sb-badge" style="background:${c}22;color:${c}">${C_LABELS[aggStatus]}</span>` +
      `<span style="font-size:0.68rem;color:var(--muted);margin-left:6px">${s.name}</span>`;

    const done = statuses.filter(s => s === 'done').length;
    const needsTB = statuses.filter(s => s === 'needs_tiebreaker').length;
    const has1 = statuses.filter(s => s === '1_pass').length;
    const notStarted = statuses.filter(s => s === '0_passes').length;
    const ordCount = ctyJurs.reduce((sum, j) => sum + (j.ordinance_count || 0), 0);

    document.getElementById('sb-stats').innerHTML = `
      <div class="sb-stat"><div class="sb-stat-label">Jurisdictions</div><div class="sb-stat-value">${ctyJurs.length}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Ordinances</div><div class="sb-stat-value">${ordCount}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Complete</div><div class="sb-stat-value" style="color:var(--green)">${done}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Remaining</div><div class="sb-stat-value" style="color:var(--muted)">${needsTB + has1 + notStarted}</div></div>
    `;

    // Show county-level progress instead of pipeline passes
    document.getElementById('sb-passes').innerHTML = [
      done > 0 ? `<span class="done">${done} complete</span>` : '',
      needsTB > 0 ? `<span style="color:var(--purple)">${needsTB} need 3rd pass</span>` : '',
      has1 > 0 ? `<span style="color:var(--blue)">${has1} need 2nd pass</span>` : '',
      notStarted > 0 ? `<span>${notStarted} not started</span>` : '',
    ].filter(Boolean).join(' &middot; ');
  } else {
    // State-level sidebar
    const js = getModelStateJurStatus(abbrev);
    const aggStatus = (() => {
      const total = s.jurisdiction_count || 0;
      const done = js.done || 0;
      const started = done + (js.needs_tiebreaker||0) + (js['1_pass']||0);
      if (done === total && total > 0) return 'all_done';
      if (done > 0) return 'some_done';
      if (started > 0) return 'some_started';
      return 'not_started';
    })();
    const c = C_COLORS[aggStatus];
    document.getElementById('sb-title').textContent = `${s.name} (${s.abbrev})`;
    document.getElementById('sb-badge-area').innerHTML =
      `<span class="sb-badge" style="background:${c}22;color:${c}">${C_LABELS[aggStatus]}</span>`;

    const isClaude = currentModel === 'claude-code';
    const ordsFound = isClaude ? s.ordinances_found : 0;
    document.getElementById('sb-stats').innerHTML = `
      <div class="sb-stat"><div class="sb-stat-label">Jurisdictions</div><div class="sb-stat-value">${s.jurisdiction_count.toLocaleString()}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Ordinances</div><div class="sb-stat-value">${ordsFound}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Complete</div><div class="sb-stat-value" style="color:var(--green)">${(js.done||0).toLocaleString()}</div></div>
      <div class="sb-stat"><div class="sb-stat-label">Remaining</div><div class="sb-stat-value" style="color:var(--muted)">${((js['0_passes']||0)+(js['1_pass']||0)+(js.needs_tiebreaker||0)).toLocaleString()}</div></div>
    `;

    const pass = (done, label) => done ? `<span class="done">${label}</span>` : `<span>${label}</span>`;
    document.getElementById('sb-passes').innerHTML =
      `${pass(s.has_pass1,'Pass 1')} &rarr; ${pass(s.has_pass2,'Pass 2')} &rarr; ${pass(s.has_tiebreaker,'Tiebreaker')}`;
  }

  const searchEl = document.getElementById('sb-search');
  searchEl.value = '';
  searchEl.oninput = () => renderJurisdictions(abbrev, searchEl.value, countyFips);
  renderJurisdictions(abbrev, searchEl.value, countyFips);
}

function renderJurisdictions(abbrev, filter, countyFips) {
  let jurs = getModelJurisdictions(abbrev);
  const list = document.getElementById('jur-list');
  const showing = document.getElementById('sb-showing');

  // When showing county context, filter to that county's jurisdictions
  // Use the geo-assigned set (from assignJursToCounties) if available, fallback to county_fips match
  if (countyFips) {
    if (currentCountyJurNames && currentCountyJurNames.size > 0) {
      jurs = jurs.filter(j => currentCountyJurNames.has(j.name));
    } else {
      jurs = jurs.filter(j => j.county_fips === countyFips);
    }
  }

  if (jurs.length === 0) {
    showing.textContent = '';
    list.innerHTML = `<div class="no-data">No jurisdiction detail available.<br>Prompts ready &mdash; launch agents to begin searching.</div>`;
    return;
  }

  const q = filter.toLowerCase();
  let filtered = q ? jurs.filter(j => j.name.toLowerCase().includes(q)) : jurs;

  // Cap at 200 to keep it responsive
  const capped = filtered.length > 200;
  const display = capped ? filtered.slice(0, 200) : filtered;

  const withOrds = filtered.filter(j => j.ordinance_count > 0).length;
  showing.textContent = `${filtered.length} jurisdictions${withOrds ? ` (${withOrds} with ordinances)` : ''}${capped ? ' — showing first 200' : ''}`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-data">No match for "${filter}"</div>`;
    return;
  }

  list.innerHTML = display.map((j, idx) => {
    const sc = S_COLORS[j.status||'0_passes'];
    const statusLabel = S_LABELS[j.status||'0_passes'];
    const fips = [j.county_fips, j.place_fips].filter(Boolean).join(' / ');
    const ordBadge = j.ordinance_count > 0
      ? `<span class="jur-badge" style="background:var(--accent);color:#fff">${j.ordinance_count} ord</span>` : '';
    const highlight = (countyFips && j.county_fips === countyFips) ? ' style="border-color:var(--accent)"' : '';

    // Build per-pass detail view
    // passes is now an array of searched passes in chronological order
    const passes = Array.isArray(j.passes) ? j.passes : [];
    const hasPasses = passes.length > 0;
    let detailHtml;

    if (hasPasses) {
      const tabColors = ['#6c8cff', '#f59e0b', '#10b981'];
      const uid = `jur-${abbrev}-${idx}`;

      // Index passes by pipeline_pass number
      const passByNum = {};
      for (const p of passes) {
        const pp = p.pipeline_pass || 0;
        passByNum[pp] = p;
      }

      // Always show all 3 slots: Search 1, Search 2, Tiebreaker
      const slots = [
        { num: 1, label: 'Search 1', color: tabColors[0] },
        { num: 2, label: 'Search 2', color: tabColors[1] },
        { num: 3, label: 'Tiebreaker', color: tabColors[2] },
      ];

      // Find first available slot for default active tab
      const firstAvail = slots.findIndex(s => passByNum[s.num]);
      const tabs = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) {
          // Not yet searched
          return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchPassTab('${uid}',${si})" style="opacity:0.35;cursor:default" title="Not yet searched"><span class="pass-dot" style="background:#555"></span>${s.label}</div>`;
        }
        const dotColor = p.ordinances.length > 0 ? s.color : '#999';
        return `<div class="pass-tab${active}" onclick="event.stopPropagation();switchPassTab('${uid}',${si})" title="${p.ordinances.length} ordinances"><span class="pass-dot" style="background:${dotColor}"></span>${s.label}</div>`;
      }).join('');

      // Build panels for all 3 slots
      const panels = slots.map((s, si) => {
        const p = passByNum[s.num];
        const active = si === firstAvail ? ' active' : '';
        if (!p) {
          return `<div class="pass-panel${active}"><div class="pass-empty" style="color:#555">Not yet searched</div></div>`;
        }
        const noteHtml = p.search_notes ? `<div class="pass-note">${esc(p.search_notes)}</div>` : '';
        if (p.ordinances.length === 0) {
          return `<div class="pass-panel${active}">${noteHtml}<div class="pass-empty">Searched &mdash; no local tobacco ordinances found.</div></div>`;
        }
        const ordsHtml = p.ordinances.map(o => {
          const lt = (o.law_type||'unknown').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
          const parts = [];
          if (o.effective_date) parts.push(`Effective ${esc(o.effective_date)}`);
          else if (o.adoption_date) parts.push(`Adopted ${esc(o.adoption_date)}`);
          if (o.ordinance_number) parts.push(`Ord. ${esc(o.ordinance_number)}`);
          if (o.source_url) parts.push(`<a href="${esc(o.source_url)}" target="_blank">${truncUrl(o.source_url)}</a>`);
          return `<div class="ord-card">
            <div class="ord-type">${lt}</div>
            ${o.description?`<div class="ord-desc">${esc(o.description)}</div>`:''}
            ${parts.length?`<div class="ord-meta">${parts.join(' &middot; ')}</div>`:''}
          </div>`;
        }).join('');
        return `<div class="pass-panel${active}">${noteHtml}<div class="pass-summary"><span class="pass-summary-pill" style="background:${s.color}22;color:${s.color}">${p.ordinances.length} ordinance${p.ordinances.length!==1?'s':''}</span></div>${ordsHtml}</div>`;
      }).join('');

      detailHtml = `<div class="jur-ords" data-uid="${uid}"><div class="pass-tabs">${tabs}</div>${panels}</div>`;
    } else {
      // No per-pass data — show reconciled ordinances
      const ordsHtml = j.ordinances.map(o => {
        const lt = (o.law_type||'unknown').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        const parts = [];
        if (o.effective_date) parts.push(`Effective ${esc(o.effective_date)}`);
        else if (o.adoption_date) parts.push(`Adopted ${esc(o.adoption_date)}`);
        else { const yr = o.year_adopted || o.year_effective; if (yr) parts.push(`${yr}`); }
        if (o.ordinance_number) parts.push(`Ord. ${esc(o.ordinance_number)}`);
        if (o.source_url) parts.push(`<a href="${esc(o.source_url)}" target="_blank">${truncUrl(o.source_url)}</a>`);
        return `<div class="ord-card">
          <div class="ord-type">${lt}</div>
          ${o.description?`<div class="ord-desc">${esc(o.description)}</div>`:''}
          ${parts.length?`<div class="ord-meta">${parts.join(' &middot; ')}</div>`:''}
        </div>`;
      }).join('');
      const emptyMsg = (j.status === '0_passes')
        ? 'Not yet searched'
        : 'No local tobacco ordinances found.';
      detailHtml = `<div class="jur-ords">${j.ordinance_count > 0 ? ordsHtml : `<div style="font-size:0.72rem;color:var(--muted);padding:3px 0">${emptyMsg}</div>`}</div>`;
    }

    return `<div class="jur-item"${highlight} onclick="this.classList.toggle('expanded')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="jur-name">${esc(j.name)}${ordBadge}<span class="jur-status" style="background:${sc}22;color:${sc}">${statusLabel}</span></div>
      </div>
      ${fips?`<div class="jur-fips">FIPS ${fips}</div>`:''}
      ${detailHtml}
    </div>`;
  }).join('');
}

// Map internal confidence labels to user-friendly text
const CONF_LABELS = {
  both_passes: 'High confidence',
  majority_confirmed: 'Confirmed (2 of 3)',
  tiebreaker_confirmed: 'Confirmed (tiebreaker)',
  tiebreaker_uncertain: 'Uncertain',
  tiebreaker_rejected: 'Rejected',
  pass1_only: 'Unconfirmed (1 pass)',
  pass2_only: 'Unconfirmed (1 pass)',
};
function confLabel(raw) { return CONF_LABELS[raw] || (raw ? raw.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : ''); }
function switchPassTab(uid, idx) {
  const container = document.querySelector(`[data-uid="${uid}"]`);
  if (!container) return;
  container.querySelectorAll('.pass-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  container.querySelectorAll('.pass-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function truncUrl(u) {
  try { const url=new URL(u); return url.hostname+(url.pathname.length>25?url.pathname.slice(0,25)+'...':url.pathname); }
  catch { return u.length>45?u.slice(0,45)+'...':u; }
}

document.getElementById('sb-close').onclick = () => document.getElementById('sidebar').classList.add('hidden');
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('sidebar').classList.add('hidden'); });
</script>
